<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonic Microworld</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inconsolata:wght@300;400&display=swap');

:root {
--bg: #0a0a0f;
--surface: #11111a;
--rim: #1e1e30;
--text: #c8c8e0;
--text-dim: #555570;
--gold: #c8a84b;
--gold-dim: #6b5820;
--white: #e8e8f4;

/* Pitch-class colors — our own system, not George's.
   Hue rotates ~30° per semitone; sat/lightness tuned for dark-bg legibility.
   Color is attached to pitch class, not position — portable across all geometries. */
--c:  #e8e8f4;
--cs: #d4a0c0;
--d:  #a0b8e0;
--ds: #80d4c0;
--e:  #a0e080;
--f:  #e0d060;
--fs: #e09040;
--g:  #e05050;
--gs: #c040a0;
--a:  #6060e0;
--as: #40a0d0;
--b:  #60c060;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(--bg);
color: var(--text);
font-family: 'Inconsolata', monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
overflow-x: hidden;
}

/* Subtle star-field background */
body::before {
content: '';
position: fixed;
inset: 0;
background-image:
radial-gradient(1px 1px at 15% 20%, rgba(200,200,240,0.3) 0%, transparent 100%),
radial-gradient(1px 1px at 45% 8%, rgba(200,200,240,0.2) 0%, transparent 100%),
radial-gradient(1px 1px at 72% 35%, rgba(200,200,240,0.25) 0%, transparent 100%),
radial-gradient(1px 1px at 88% 12%, rgba(200,200,240,0.2) 0%, transparent 100%),
radial-gradient(1px 1px at 30% 80%, rgba(200,200,240,0.15) 0%, transparent 100%),
radial-gradient(1px 1px at 60% 70%, rgba(200,200,240,0.2) 0%, transparent 100%),
radial-gradient(1px 1px at 5% 55%, rgba(200,200,240,0.15) 0%, transparent 100%),
radial-gradient(1px 1px at 93% 68%, rgba(200,200,240,0.2) 0%, transparent 100%);
pointer-events: none;
z-index: 0;
}

header {
text-align: center;
padding: 2rem 1rem 0.5rem;
position: relative;
z-index: 1;
}

header h1 {
font-family: 'Cinzel', serif;
font-size: clamp(1.1rem, 3vw, 1.6rem);
font-weight: 400;
letter-spacing: 0.25em;
color: var(--gold);
text-transform: uppercase;
}

header p {
font-size: 0.7rem;
color: var(--text-dim);
letter-spacing: 0.15em;
margin-top: 0.3rem;
}

.main {
display: flex;
flex-direction: column;
align-items: center;
gap: 1.5rem;
padding: 1rem;
width: 100%;
max-width: 600px;
position: relative;
z-index: 1;
}

/* ── CANVAS WRAPPER ── */
.canvas-wrap {
position: relative;
width: min(480px, 92vw);
height: min(480px, 92vw);
}

canvas {
width: 100%;
height: 100%;
display: block;
}

/* ── NOTE READOUT ── */
.readout {
display: flex;
align-items: center;
gap: 2rem;
background: var(--surface);
border: 1px solid var(--rim);
border-radius: 4px;
padding: 0.8rem 1.6rem;
width: min(480px, 92vw);
}

.note-display {
display: flex;
flex-direction: column;
align-items: center;
min-width: 3.5rem;
}

.note-name {
font-family: 'Cinzel', serif;
font-size: 2.8rem;
line-height: 1;
color: var(--white);
transition: color 0.15s;
}

.note-label {
font-size: 0.6rem;
letter-spacing: 0.2em;
color: var(--text-dim);
text-transform: uppercase;
margin-top: 0.2rem;
}

.divider {
width: 1px;
height: 3rem;
background: var(--rim);
}

.info-block {
display: flex;
flex-direction: column;
gap: 0.35rem;
flex: 1;
}

.info-row {
display: flex;
justify-content: space-between;
font-size: 0.72rem;
}

.info-key { color: var(--text-dim); letter-spacing: 0.08em; }
.info-val { color: var(--text); letter-spacing: 0.05em; }

/* ── KEYBOARD ── */
.keyboard-wrap {
width: min(480px, 92vw);
}

.keyboard-label {
font-size: 0.6rem;
letter-spacing: 0.2em;
color: var(--text-dim);
text-transform: uppercase;
margin-bottom: 0.5rem;
}

.keyboard {
position: relative;
height: 80px;
display: flex;
}

.white-keys {
display: flex;
width: 100%;
gap: 2px;
}

.wkey {
flex: 1;
background: #d8d8e8;
border-radius: 0 0 4px 4px;
border: 1px solid #888;
cursor: pointer;
position: relative;
transition: background 0.1s;
display: flex;
align-items: flex-end;
justify-content: center;
padding-bottom: 6px;
}

.wkey span {
font-size: 0.55rem;
color: #666;
font-family: 'Inconsolata', monospace;
letter-spacing: 0.05em;
pointer-events: none;
}

.wkey.active, .wkey:hover { background: #ffffff; }
.wkey.lit { background: var(--wkey-color, #ffffff); }

.black-keys {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 55%;
pointer-events: none;
}

.bkey {
position: absolute;
width: 8%;
height: 100%;
background: #1a1a2a;
border-radius: 0 0 3px 3px;
border: 1px solid #000;
cursor: pointer;
pointer-events: all;
transition: background 0.1s;
}

.bkey.active, .bkey:hover { background: #333355; }
.bkey.lit { background: var(--bkey-color, #333355); }

/* ── CONTROLS ── */
.controls {
display: flex;
gap: 0.6rem;
flex-wrap: wrap;
justify-content: center;
width: min(480px, 92vw);
}

.btn {
font-family: 'Inconsolata', monospace;
font-size: 0.65rem;
letter-spacing: 0.15em;
text-transform: uppercase;
background: var(--surface);
border: 1px solid var(--rim);
color: var(--text-dim);
padding: 0.4rem 0.9rem;
border-radius: 2px;
cursor: pointer;
transition: all 0.15s;
}

.btn:hover, .btn.active {
border-color: var(--gold-dim);
color: var(--gold);
}

.btn.active {
background: #1a1508;
}

/* ── MIC STATUS ── */
.mic-bar {
display: flex;
align-items: center;
gap: 0.8rem;
font-size: 0.65rem;
letter-spacing: 0.12em;
color: var(--text-dim);
}

.mic-dot {
width: 7px;
height: 7px;
border-radius: 50%;
background: var(--rim);
transition: background 0.3s;
}

.mic-dot.on { background: #50e090; box-shadow: 0 0 6px #50e090; }
.mic-dot.searching { background: var(--gold); animation: pulse 1s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── LEGEND ── */
.legend {
width: min(480px, 92vw);
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 0.3rem;
padding-bottom: 2rem;
}

.leg-item {
display: flex;
align-items: center;
gap: 0.4rem;
font-size: 0.6rem;
color: var(--text-dim);
}

.leg-dot {
width: 8px;
height: 8px;
border-radius: 50%;
flex-shrink: 0;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

</head>
<body>

<header>
  <h1>Harmonic Microworld</h1>
  <p>pitch · geometry · voice leading — after Euler 1739 · Forte 1973</p>
</header>

<div class="main">

  <!-- CANVAS -->

  <div class="canvas-wrap">
    <canvas id="wheel" width="480" height="480"></canvas>
  </div>

  <!-- READOUT -->

  <div class="readout">
    <div class="note-display">
      <div class="note-name" id="noteName">—</div>
      <div class="note-label">pitch class</div>
    </div>
    <div class="divider"></div>
    <div class="info-block">
      <div class="info-row">
        <span class="info-key">interval</span>
        <span class="info-val" id="infoInterval">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">shape</span>
        <span class="info-val" id="infoShape">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">semitones</span>
        <span class="info-val" id="infoSemitones">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">pc class</span>
        <span class="info-val" id="infoPCClass">—</span>
      </div>
    </div>
  </div>

  <!-- KEYBOARD -->

  <div class="keyboard-wrap">
    <div class="keyboard-label">click to play · or use mic / midi</div>
    <div class="keyboard" id="keyboard">
      <div class="white-keys" id="whiteKeys"></div>
      <div class="black-keys" id="blackKeys"></div>
    </div>
  </div>

  <!-- CONTROLS -->

  <div class="controls">
    <button class="btn active" id="btnChromatic" onclick="setView('chromatic')">Chromatic circle</button>
    <button class="btn" id="btnFifths" onclick="setView('fifths')">Circle of fifths</button>
    <button class="btn" id="btnPolygon" onclick="togglePolygon()">Show polygon</button>
    <button class="btn" id="btnMic" onclick="toggleMic()">🎙 Mic input</button>
    <button class="btn active" id="btnSound" onclick="toggleSound()">🔊 Sound</button>
    <button class="btn" id="btnClear" onclick="clearAll()">Clear</button>
  </div>

  <!-- MIC STATUS -->

  <div class="mic-bar">
    <div class="mic-dot" id="micDot"></div>
    <span id="micStatus">mic off</span>
  </div>

  <div class="mic-bar">
    <div class="mic-dot" id="midiDot"></div>
    <span id="midiStatus">midi off</span>
  </div>

  <!-- LEGEND -->

  <div class="legend" id="legend"></div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DOMAIN CONSTANTS
// ═══════════════════════════════════════════════════════════════
//
// These are facts about music theory and our color mapping.
// They never change at runtime. Nothing below should mutate them.

const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

// Our own color system: hue rotates ~30° per semitone.
// Color is attached to pitch class (not position on circle) —
// this makes it portable across chromatic, fifths, and Tonnetz views.
const NOTE_COLORS = [
  '#e8e8f4', // C  — near white
  '#d4a0c0', // C♯ — rose
  '#a0b8e0', // D  — steel blue
  '#80d4c0', // D♯ — teal
  '#a0e080', // E  — spring green
  '#e0d060', // F  — amber
  '#e09040', // F♯ — orange
  '#e05050', // G  — coral red
  '#c040a0', // G♯ — magenta
  '#6060e0', // A  — indigo
  '#40a0d0', // A♯ — sky
  '#60c060', // B  — green
];

// Circle-of-fifths ordering: each step is +7 semitones (mod 12)
const FIFTHS_ORDER = [0,7,2,9,4,11,6,1,8,3,10,5]; // C G D A E B F♯ C♯ G♯ D♯ A♯ F

const INTERVAL_NAMES = [
  'Unison','Minor 2nd','Major 2nd','Minor 3rd',
  'Major 3rd','Perfect 4th','Tritone','Perfect 5th',
  'Minor 6th','Major 6th','Minor 7th','Major 7th'
];

const SHAPE_NAMES = {
  2:'Line', 3:'Triangle', 4:'Quadrilateral', 5:'Pentagon', 6:'Hexagon',
  7:'Heptagon', 8:'Octagon', 9:'Nonagon', 10:'Decagon', 11:'Undecagon', 12:'Dodecagon'
};

// Piano keyboard layout constants
const WHITE_PCS = [0,2,4,5,7,9,11];
const BLACK_PCS_IN_ORDER = [1,3,6,8,10];
const BLACK_KEY_OFFSETS = [0.65, 1.65, 3.65, 4.65, 5.65]; // white-key units within octave
const NUM_OCTAVES = 2;

// Computer keyboard → pitch class mapping (piano-like layout)
const KEY_MAP = {
  'a': 0,  'w': 1,  's': 2,  'e': 3,  'd': 4,  'f': 5,
  't': 6,  'g': 7,  'y': 8,  'h': 9,  'u': 10, 'j': 11,
};


// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
//
// Spec: There are four independent input sources, each owning a
// set of pitch classes (0–11). No input source reads or writes
// another's set. The single derived value `activeNotes` is the
// union of all sources, recomputed by rebuildActiveNotes().
//
// Invariant: activeNotes === keyboardHeld ∪ clickHeld ∪ midiPitchClasses ∪ {micNote}
// (where micNote is included only when non-null, and
//  midiPitchClasses = the set of unique values in midiHeld)
//
// No code outside rebuildActiveNotes() may write to activeNotes.
// Every input handler: (1) mutates its own source, (2) calls rebuildActiveNotes().
//
// midiHeld is a Map<noteNumber, pitchClass>. This allows multiple
// octaves of the same pitch class to be held simultaneously —
// releasing one octave doesn't deactivate the pitch class if another
// octave is still held. rebuildActiveNotes() derives the pitch class
// set from the map's values.

const state = {
  // ── Input sources (each independently owned) ──
  keyboardHeld: new Set(),   // computer keyboard keys currently pressed
  clickHeld:    new Set(),   // mouse/touch toggles on piano widget
  midiHeld:     new Map(),   // Map<noteNumber, pitchClass> — MIDI keys currently down
  micNote:      null,        // single pitch class from mic, or null
  micFreq:      null,        // detected frequency in Hz (for display), or null

  // ── Derived (readonly — only rebuildActiveNotes writes this) ──
  activeNotes:  new Set(),

  // ── View settings ──
  view:         'chromatic', // 'chromatic' | 'fifths'
  showPolygon:  false,
  soundEnabled: true,        // whether input sources trigger the synth

  // ── MIDI subsystem ──
  midiAccess:    null,       // MIDIAccess object, or null if unavailable
  midiConnected: false,      // true if at least one MIDI input is connected
  midiDeviceName: null,      // name of first connected input (for display)

  // ── Mic subsystem (owned exclusively by mic functions) ──
  micActive:    false,
  micDenied:    false,        // true if getUserMedia was denied/failed
  audioCtx:     null,
  analyser:     null,
  micStream:    null,
  animFrame:    null,
  pitchHistory: [],
};

// Precondition: at least one input source has changed.
// Postcondition: state.activeNotes is the exact union of all input sources.
//   midiHeld is a Map<noteNumber, pitchClass>; we take the set of its values.
// Side effect: triggers render().
function rebuildActiveNotes() {
  const next = new Set([
    ...state.keyboardHeld,
    ...state.clickHeld,
    ...state.midiHeld.values(),
  ]);
  if (state.micNote !== null) next.add(state.micNote);
  state.activeNotes = next;
  render();
}


// ═══════════════════════════════════════════════════════════════
// PURE HELPERS
// ═══════════════════════════════════════════════════════════════
//
// These are pure functions: output depends only on arguments.
// No DOM access, no state reads.

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Returns angle in radians for a pitch class given a view mode.
// 0 = top (−π/2), clockwise.
function noteAngle(pc, viewMode) {
  const pos = viewMode === 'chromatic' ? pc : FIFTHS_ORDER.indexOf(pc);
  return (pos / 12) * Math.PI * 2 - Math.PI / 2;
}

function angleXY(angle, r, cx, cy) {
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}

// Convert frequency (Hz) to pitch class (0–11).
function freqToPitchClass(freq) {
  const midi = 69 + 12 * Math.log2(freq / 440);
  return ((Math.round(midi) % 12) + 12) % 12;
}

// Compute a sorted array of active pitch classes and derived display info.
// This is the single place where "what to show" is computed from raw state.
//
// Postcondition: returned object has:
//   sorted: number[]      — pitch classes sorted ascending
//   count: number         — length of sorted
//   interval: number|null — semitone distance (only meaningful for 2+ notes)
//   shapeName: string     — geometric shape name
//   intervalName: string  — musical interval name
function deriveDisplayInfo(activeNotes) {
  const sorted = Array.from(activeNotes).sort((a, b) => a - b);
  const count = sorted.length;

  if (count < 2) {
    return { sorted, count, interval: null, shapeName: count === 1 ? 'Point' : '', intervalName: count === 1 ? 'Unison' : '' };
  }

  const lo = sorted[0], hi = sorted[count - 1];
  const interval = (hi - lo + 12) % 12;
  const shapeName = SHAPE_NAMES[count] || count + '-gon';
  const intervalName = INTERVAL_NAMES[interval] || '—';

  return { sorted, count, interval, shapeName, intervalName };
}


// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════
//
// Spec: render() reads state and writes to the DOM. It is the ONLY
// function that writes to the DOM after initial setup (buildKeyboard,
// buildLegend). All visual updates flow through here.
//
// Render is a pure function of state → DOM side effects.
// It should be safe to call at any time; calling it twice with the
// same state produces the same output.

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const SIZE = 480;
const CX = SIZE / 2, CY = SIZE / 2;
const R_OUTER = 200;
const R_INNER = 158;
const R_LABEL = 178;
const R_POLY  = 138;

function render() {
  const info = deriveDisplayInfo(state.activeNotes);
  renderCanvas(info);
  renderReadout(info);
  renderKeyboard();
  renderControls();
  renderMicStatus();
  renderMidiStatus();
}

// ── Canvas ──

function renderCanvas(info) {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // Background disc
  const bgGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, R_OUTER + 30);
  bgGrad.addColorStop(0, '#13131f');
  bgGrad.addColorStop(1, '#0a0a0f');
  ctx.beginPath();
  ctx.arc(CX, CY, R_OUTER + 28, 0, Math.PI * 2);
  ctx.fillStyle = bgGrad;
  ctx.fill();

  // Outer rim
  ctx.beginPath();
  ctx.arc(CX, CY, R_OUTER + 4, 0, Math.PI * 2);
  ctx.strokeStyle = '#2a2a40';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner rim
  ctx.beginPath();
  ctx.arc(CX, CY, R_INNER - 4, 0, Math.PI * 2);
  ctx.strokeStyle = '#1e1e30';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Axis lines (faint)
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const p1 = angleXY(ang, R_INNER - 8, CX, CY);
    const p2 = angleXY(ang, R_OUTER + 8, CX, CY);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Polygon (if enabled and 2+ notes)
  if (state.showPolygon && info.count >= 2) {
    renderPolygon(info.sorted);
  }

  // Note arcs
  for (let i = 0; i < 12; i++) {
    renderNoteArc(i, state.activeNotes.has(i));
  }

  // Center text
  renderCenterText(info);

  // View label
  ctx.font = '8px "Inconsolata", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,200,220,0.18)';
  const label = state.view === 'chromatic' ? 'CHROMATIC · semitone order' : 'CIRCLE OF FIFTHS · key order';
  ctx.fillText(label, CX, CY + R_INNER - 20);
}

function renderPolygon(sorted) {
  const points = sorted.map(pc => angleXY(noteAngle(pc, state.view), R_POLY, CX, CY));
  const col = NOTE_COLORS[sorted[0]];

  // Fill
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
  ctx.closePath();
  const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, R_POLY);
  grd.addColorStop(0, hexAlpha(col, 0.12));
  grd.addColorStop(1, hexAlpha(col, 0.03));
  ctx.fillStyle = grd;
  ctx.fill();

  // Edges
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
  ctx.closePath();
  ctx.strokeStyle = hexAlpha(col, 0.55);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Vertex dots
  for (let i = 0; i < sorted.length; i++) {
    ctx.beginPath();
    ctx.arc(points[i].x, points[i].y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = NOTE_COLORS[sorted[i]];
    ctx.fill();
  }
}

function renderNoteArc(pc, isActive) {
  const ang = noteAngle(pc, state.view);
  const span = (Math.PI * 2 / 12) * 0.82;
  const startAng = ang - span / 2;
  const endAng = ang + span / 2;
  const color = NOTE_COLORS[pc];

  // Arc fill
  ctx.beginPath();
  ctx.arc(CX, CY, R_OUTER, startAng, endAng);
  ctx.arc(CX, CY, R_INNER, endAng, startAng, true);
  ctx.closePath();

  if (isActive) {
    const grad = ctx.createRadialGradient(CX, CY, R_INNER, CX, CY, R_OUTER);
    grad.addColorStop(0, hexAlpha(color, 0.15));
    grad.addColorStop(1, hexAlpha(color, 0.75));
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = hexAlpha(color, 0.9);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Label
  const lp = angleXY(ang, R_LABEL, CX, CY);
  ctx.font = isActive ? 'bold 13px "Cinzel", serif' : '11px "Inconsolata", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = isActive ? color : 'rgba(200,200,220,0.35)';
  ctx.fillText(NOTE_NAMES[pc], lp.x, lp.y);

  // Outer glow halo
  if (isActive) {
    ctx.beginPath();
    ctx.arc(CX, CY, R_OUTER + 10, startAng - 0.01, endAng + 0.01);
    ctx.arc(CX, CY, R_OUTER + 2, endAng + 0.01, startAng - 0.01, true);
    ctx.closePath();
    ctx.fillStyle = hexAlpha(color, 0.25);
    ctx.fill();
  }
}

function renderCenterText(info) {
  if (info.count === 0) {
    ctx.font = '11px "Inconsolata", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(200,200,220,0.2)';
    ctx.fillText('play a note', CX, CY - 8);
    ctx.fillText('to begin', CX, CY + 10);
  } else if (info.count === 1) {
    const pc = info.sorted[0];
    ctx.font = 'bold 28px "Cinzel", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = NOTE_COLORS[pc];
    ctx.fillText(NOTE_NAMES[pc], CX, CY - 4);
    ctx.font = '9px "Inconsolata", monospace';
    ctx.fillStyle = 'rgba(200,200,220,0.4)';
    ctx.fillText('pc ' + pc, CX, CY + 18);
  } else {
    ctx.font = '10px "Inconsolata", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(200,200,220,0.5)';
    ctx.fillText(info.count + ' notes', CX, CY - 14);
    ctx.fillStyle = NOTE_COLORS[info.sorted[0]];
    ctx.font = '9px "Inconsolata", monospace';
    if (info.count === 2) {
      ctx.fillText(info.intervalName, CX, CY + 2);
    }
    ctx.fillStyle = 'rgba(200,200,220,0.3)';
    ctx.fillText('set {' + info.sorted.join(',') + '}', CX, CY + 18);
  }
}

// ── Readout panel ──

function renderReadout(info) {
  const nameEl = document.getElementById('noteName');
  const intEl  = document.getElementById('infoInterval');
  const shpEl  = document.getElementById('infoShape');
  const semEl  = document.getElementById('infoSemitones');
  const pcEl   = document.getElementById('infoPCClass');

  if (info.count === 0) {
    nameEl.textContent = '—';
    nameEl.style.color = '';
    intEl.textContent = '—';
    shpEl.textContent = '—';
    semEl.textContent = '—';
    pcEl.textContent  = '—';
  } else if (info.count === 1) {
    const pc = info.sorted[0];
    nameEl.textContent = NOTE_NAMES[pc];
    nameEl.style.color = NOTE_COLORS[pc];
    intEl.textContent = 'Unison';
    shpEl.textContent = 'Point';
    semEl.textContent = '0';
    pcEl.textContent  = String(pc);
  } else {
    nameEl.textContent = NOTE_NAMES[info.sorted[0]];
    nameEl.style.color = NOTE_COLORS[info.sorted[0]];
    intEl.textContent  = info.intervalName;
    shpEl.textContent  = info.shapeName;
    semEl.textContent  = String(info.interval);
    pcEl.textContent   = '(' + info.sorted.join(',') + ')';
  }
}

// ── Piano keyboard highlighting ──

function renderKeyboard() {
  document.querySelectorAll('.wkey, .bkey').forEach(el => {
    const pc = parseInt(el.dataset.pc);
    el.classList.toggle('lit', state.activeNotes.has(pc));
  });
}

// ── Control button states ──

function renderControls() {
  document.getElementById('btnChromatic').classList.toggle('active', state.view === 'chromatic');
  document.getElementById('btnFifths').classList.toggle('active', state.view === 'fifths');
  document.getElementById('btnPolygon').classList.toggle('active', state.showPolygon);
  document.getElementById('btnMic').classList.toggle('active', state.micActive);
  document.getElementById('btnSound').classList.toggle('active', state.soundEnabled);
}

// ── Mic status indicator ──
// Note: this only renders the current mic state. The mic detection loop
// updates state.micNote and calls rebuildActiveNotes(), which calls render(),
// which calls this. The mic status text/dot is set here, not in detectPitch().

function renderMicStatus() {
  const dot = document.getElementById('micDot');
  const label = document.getElementById('micStatus');

  if (state.micDenied) {
    dot.className = 'mic-dot';
    label.textContent = 'mic denied';
  } else if (!state.micActive) {
    dot.className = 'mic-dot';
    label.textContent = 'mic off';
  } else if (state.micNote !== null) {
    dot.className = 'mic-dot on';
    // Show detected note name and frequency if available
    const freqStr = state.micFreq ? '  (' + Math.round(state.micFreq) + ' Hz)' : '';
    label.textContent = NOTE_NAMES[state.micNote] + freqStr;
  } else {
    dot.className = 'mic-dot searching';
    label.textContent = 'listening...';
  }
}

// ── MIDI status indicator ──

function renderMidiStatus() {
  const dot = document.getElementById('midiDot');
  const label = document.getElementById('midiStatus');

  if (state.midiConnected) {
    const noteCount = state.midiHeld.size;
    dot.className = noteCount > 0 ? 'mic-dot on' : 'mic-dot searching';
    const name = state.midiDeviceName || 'MIDI device';
    label.textContent = noteCount > 0
      ? name + '  (' + noteCount + ' held)'
      : name + '  connected';
  } else {
    dot.className = 'mic-dot';
    label.textContent = 'midi off';
  }
}


// ═══════════════════════════════════════════════════════════════
// INPUT: COMPUTER KEYBOARD
// ═══════════════════════════════════════════════════════════════
//
// Spec: keydown adds to state.keyboardHeld, keyup removes.
// Only touches state.keyboardHeld. Calls rebuildActiveNotes().
// keysDown tracks raw key strings to prevent repeat-fire.

const keysDown = new Set();

document.addEventListener('keydown', e => {
  if (keysDown.has(e.key)) return;
  const pc = KEY_MAP[e.key.toLowerCase()];
  if (pc !== undefined) {
    keysDown.add(e.key);
    state.keyboardHeld.add(pc);
    synthAttack(pcToNoteName(pc));
    rebuildActiveNotes();
  }
});

document.addEventListener('keyup', e => {
  keysDown.delete(e.key);
  const pc = KEY_MAP[e.key.toLowerCase()];
  if (pc !== undefined) {
    state.keyboardHeld.delete(pc);
    synthRelease(pcToNoteName(pc));
    rebuildActiveNotes();
  }
});


// ═══════════════════════════════════════════════════════════════
// INPUT: CLICK/TOUCH (piano widget)
// ═══════════════════════════════════════════════════════════════
//
// Spec: clicking a piano key toggles that pitch class in
// state.clickHeld. This is a toggle (latch) behavior — click
// once to activate, click again to deactivate. Only touches
// state.clickHeld. Calls rebuildActiveNotes().

function handlePianoClick(pc) {
  if (state.clickHeld.has(pc)) {
    state.clickHeld.delete(pc);
    synthRelease(pcToNoteName(pc));
  } else {
    state.clickHeld.add(pc);
    synthAttack(pcToNoteName(pc));
  }
  rebuildActiveNotes();
}


// ═══════════════════════════════════════════════════════════════
// INPUT: MIDI
// ═══════════════════════════════════════════════════════════════
//
// Spec: MIDI note-on adds an entry to state.midiHeld (keyed by
// note number, value is pitch class). Note-off removes by note
// number. This means holding C3 and C4 (both pc 0) creates two
// map entries; releasing C3 removes only its entry, and pc 0
// stays active because C4's entry remains.
//
// Only touches state.midiHeld, state.midiAccess, state.midiConnected,
// and state.midiDeviceName. Calls rebuildActiveNotes() on note changes.
//
// initMIDI() is called once at page load. It is fire-and-forget:
// if Web MIDI is unavailable or denied, nothing breaks.
// Hot-plugging is supported via the statechange event.

async function initMIDI() {
  if (!navigator.requestMIDIAccess) return; // Web MIDI not supported

  try {
    const access = await navigator.requestMIDIAccess();
    state.midiAccess = access;

    // Attach handlers to all currently connected inputs
    attachMIDIInputs(access);

    // Listen for hot-plug / unplug
    access.onstatechange = () => attachMIDIInputs(access);
  } catch (e) {
    // MIDI access denied — no action needed, other inputs still work
  }
}

// (Re-)attach onmidimessage handlers to all connected inputs.
// Called on initial setup and on statechange (hot-plug).
function attachMIDIInputs(access) {
  let firstName = null;
  let hasConnected = false;

  for (const input of access.inputs.values()) {
    if (input.state === 'connected') {
      input.onmidimessage = handleMIDIMessage;
      hasConnected = true;
      if (!firstName) firstName = input.name;
    }
  }

  state.midiConnected = hasConnected;
  state.midiDeviceName = firstName;

  // If a device was unplugged, any notes it was holding are now orphaned.
  // Clear midiHeld to avoid stuck notes.
  if (!hasConnected && state.midiHeld.size > 0) {
    state.midiHeld.clear();
    rebuildActiveNotes();
  } else {
    render(); // update MIDI status display
  }
}

// Parse a MIDI message and update state.midiHeld.
//
// Precondition: e.data is a Uint8Array from a MIDIMessageEvent.
// We only handle note-on and note-off messages. All other message
// types (CC, pitch bend, sysex, etc.) are ignored.
//
// Note-on with velocity 0 is treated as note-off (common device behavior).
function handleMIDIMessage(e) {
  const data = e.data;
  if (!data || data.length < 3) return;

  const status = data[0] & 0xf0; // high nibble = message type
  const noteNumber = data[1];
  const velocity = data[2];

  if (status === 0x90 && velocity > 0) {
    // Note-on
    state.midiHeld.set(noteNumber, noteNumber % 12);
    synthAttack(midiNoteToName(noteNumber));
    rebuildActiveNotes();
  } else if (status === 0x80 || (status === 0x90 && velocity === 0)) {
    // Note-off
    state.midiHeld.delete(noteNumber);
    synthRelease(midiNoteToName(noteNumber));
    rebuildActiveNotes();
  }
}


// ═══════════════════════════════════════════════════════════════
// INPUT: MICROPHONE
// ═══════════════════════════════════════════════════════════════
//
// Spec: the mic subsystem writes to state.micNote (a single pitch
// class or null). It does not touch any other input source's set.
// It calls rebuildActiveNotes() when micNote changes.
//
// The mic detection loop runs via requestAnimationFrame when active.
// Smoothing: requires 3 consistent readings in last 5 to accept a note.

async function toggleMic() {
  if (state.micActive) {
    stopMic();
  } else {
    await startMic();
  }
}

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    state.micStream = stream;
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 4096;
    const src = state.audioCtx.createMediaStreamSource(stream);
    src.connect(state.analyser);
    state.micActive = true;
    state.micDenied = false;
    state.pitchHistory = [];
    state.micNote = null;
    state.micFreq = null;
    render(); // show "listening..." state
    detectPitch();
  } catch (e) {
    state.micActive = false;
    state.micDenied = true;
    render();
  }
}

function stopMic() {
  if (state.micStream) state.micStream.getTracks().forEach(t => t.stop());
  if (state.audioCtx) state.audioCtx.close();
  if (state.animFrame) cancelAnimationFrame(state.animFrame);
  state.micActive = false;
  state.micDenied = false;
  state.audioCtx = null;
  state.analyser = null;
  state.micStream = null;
  state.animFrame = null;
  state.pitchHistory = [];
  state.micNote = null;
  state.micFreq = null;
  rebuildActiveNotes();
}

function detectPitch() {
  if (!state.micActive) return;

  const buffer = new Float32Array(state.analyser.fftSize);
  state.analyser.getFloatTimeDomainData(buffer);

  const freq = autoCorrelate(buffer, state.audioCtx.sampleRate);
  let newMicNote = null;
  let newMicFreq = null;

  if (freq > 60 && freq < 2000) {
    const pc = freqToPitchClass(freq);
    newMicFreq = freq;

    // Smoothing: require 3 of last 5 readings to agree
    state.pitchHistory.push(pc);
    if (state.pitchHistory.length > 5) state.pitchHistory.shift();
    const mode = state.pitchHistory.filter(p => p === pc).length;
    if (mode >= 3) {
      newMicNote = pc;
    }
  } else {
    state.pitchHistory = [];
  }

  // Only rebuild if micNote actually changed
  const noteChanged = newMicNote !== state.micNote;
  state.micFreq = newMicFreq;
  if (noteChanged) {
    state.micNote = newMicNote;
    rebuildActiveNotes();
  } else {
    // Freq display may have changed even if note hasn't — just re-render mic status
    renderMicStatus();
  }

  state.animFrame = requestAnimationFrame(detectPitch);
}

// McLeod pitch method approximation (autocorrelation).
// Pure function: buffer in, frequency out. Returns -1 if too quiet.
function autoCorrelate(buffer, sampleRate) {
  const SIZE = buffer.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.015) return -1;

  let r1 = 0, r2 = SIZE - 1;
  for (let i = 0; i < SIZE / 2; i++) {
    if (Math.abs(buffer[i]) < 0.2) { r1 = i; break; }
  }
  for (let i = 1; i < SIZE / 2; i++) {
    if (Math.abs(buffer[SIZE - i]) < 0.2) { r2 = SIZE - i; break; }
  }

  const buf = buffer.slice(r1, r2);
  const c = new Array(buf.length).fill(0);
  for (let i = 0; i < buf.length; i++) {
    for (let j = 0; j < buf.length - i; j++) {
      c[i] += buf[j] * buf[j + i];
    }
  }

  let d = 0;
  while (c[d] > c[d + 1]) d++;
  let maxVal = -1, maxPos = -1;
  for (let i = d; i < buf.length; i++) {
    if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; }
  }
  if (maxPos < 0) return -1;

  let T0 = maxPos;
  const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
  if (x1 !== undefined && x3 !== undefined) {
    T0 = T0 + (x3 - x1) / (2 * (2 * x2 - x1 - x3));
  }
  return sampleRate / T0;
}


// ═══════════════════════════════════════════════════════════════
// VIEW / MODE CONTROLS
// ═══════════════════════════════════════════════════════════════
//
// Spec: these mutate view settings in state and call render().
// They do not touch input sources or activeNotes.

function setView(v) {
  state.view = v;
  render();
}

function togglePolygon() {
  state.showPolygon = !state.showPolygon;
  render();
}

function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  // If turning off, release all currently sounding notes
  if (!state.soundEnabled) {
    synth.releaseAll();
  }
  render();
}

function clearAll() {
  state.keyboardHeld.clear();
  state.clickHeld.clear();
  state.midiHeld.clear();
  // Don't clear micNote — mic keeps detecting if active.
  // User can stop mic separately.
  synth.releaseAll();
  rebuildActiveNotes();
}


// ═══════════════════════════════════════════════════════════════
// SOUND: Tone.js SYNTH
// ═══════════════════════════════════════════════════════════════
//
// Spec: the synth is an OUTPUT, not an input source. It does not
// read or write state.activeNotes. Instead, input handlers that
// should produce sound call synthAttack/synthRelease directly.
//
// Which sources trigger sound:
//   - Computer keyboard: yes (fixed octave, C4–B4)
//   - Click/touch piano: yes (fixed octave, C4–B4)
//   - MIDI: yes (real octave from note number)
//   - Mic: no (would create feedback)
//
// The synth object lives outside state, like the canvas context.
// Tone.start() is called lazily on first synthAttack (browser
// autoplay policy requires a user gesture).
//
// synthAttack/synthRelease use note name strings ("C4", "F#5")
// as keys. Tone.js PolySynth handles polyphony internally.

const NOTE_NAMES_TONE = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

let toneStarted = false;
const synth = new Tone.PolySynth(Tone.Synth, {
  maxPolyphony: 16,
  voice: Tone.Synth,
  options: {
    oscillator: { type: 'triangle' },
    envelope: {
      attack: 0.02,
      decay: 0.3,
      sustain: 0.4,
      release: 0.8,
    },
    volume: -12,
  },
}).toDestination();

// Ensure Tone.js AudioContext is started (browser autoplay policy).
// Called before every attack; idempotent after first call.
async function ensureToneStarted() {
  if (!toneStarted) {
    await Tone.start();
    toneStarted = true;
  }
}

// Convert pitch class (0–11) to a note name in octave 4.
// e.g. 0 → "C4", 6 → "F#4"
function pcToNoteName(pc, octave) {
  return NOTE_NAMES_TONE[pc] + (octave !== undefined ? octave : 4);
}

// Convert MIDI note number (0–127) to a note name.
// e.g. 60 → "C4", 72 → "C5"
function midiNoteToName(noteNumber) {
  const pc = noteNumber % 12;
  const octave = Math.floor(noteNumber / 12) - 1;
  return NOTE_NAMES_TONE[pc] + octave;
}

// Attack a note by name string. Idempotent if already sounding.
function synthAttack(noteName) {
  if (!state.soundEnabled) return;
  ensureToneStarted();
  synth.triggerAttack(noteName);
}

// Release a note by name string.
function synthRelease(noteName) {
  synth.triggerRelease(noteName);
}


// ═══════════════════════════════════════════════════════════════
// ONE-TIME SETUP (runs once at load, builds DOM elements)
// ═══════════════════════════════════════════════════════════════

function buildKeyboard() {
  const whiteContainer = document.getElementById('whiteKeys');
  const blackContainer = document.getElementById('blackKeys');
  whiteContainer.innerHTML = '';
  blackContainer.innerHTML = '';

  const totalWhite = WHITE_PCS.length * NUM_OCTAVES;
  const ww = 100 / totalWhite; // % per white key

  for (let oct = 0; oct < NUM_OCTAVES; oct++) {
    WHITE_PCS.forEach((pc) => {
      const div = document.createElement('div');
      div.className = 'wkey';
      div.dataset.pc = pc;
      div.innerHTML = `<span>${NOTE_NAMES[pc]}</span>`;
      div.style.setProperty('--wkey-color', NOTE_COLORS[pc]);
      div.addEventListener('mousedown', () => handlePianoClick(pc));
      whiteContainer.appendChild(div);
    });
  }

  for (let oct = 0; oct < NUM_OCTAVES; oct++) {
    BLACK_KEY_OFFSETS.forEach((off, bi) => {
      const pc = BLACK_PCS_IN_ORDER[bi];
      const div = document.createElement('div');
      div.className = 'bkey';
      div.dataset.pc = pc;
      div.style.setProperty('--bkey-color', NOTE_COLORS[pc]);
      div.style.left = (oct * WHITE_PCS.length + off) * ww + '%';
      div.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        handlePianoClick(pc);
      });
      blackContainer.appendChild(div);
    });
  }
}

function buildLegend() {
  const el = document.getElementById('legend');
  NOTE_NAMES.forEach((name, i) => {
    el.innerHTML += `
      <div class="leg-item">
        <div class="leg-dot" style="background:${NOTE_COLORS[i]}"></div>
        <span>${name}</span>
      </div>`;
  });
}

// ── Go ──
buildKeyboard();
buildLegend();
initMIDI();
render();
</script>
