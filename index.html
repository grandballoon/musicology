  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-light:oklch(86%   0.10  80);\n  --sidebar-w: 220px;\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\n\nbody {\n  background: var(--bg);\n  color: var(--text);\n  font-family: 'Inconsolata', monospace;\n  height: 100vh;\n  overflow: hidden;\n  display: flex;\n}\n\n/* ── SIDEBAR ── */\n.sidebar {\n  width: var(--sidebar-w);\n  flex-shrink: 0;\n  background: var(--surface);\n  border-right: 1px solid var(--rim);\n  display: flex;\n  flex-direction: column;\n  height: 100vh;\n  overflow: hidden;\n}\n\n.sidebar-brand {\n  padding: 1.1rem 1.2rem 0.9rem;\n  border-bottom: 1px solid var(--rim);\n}\n\n.sidebar-brand h1 {\n  font-family: 'Cinzel', serif;\n  font-size: 0.82rem;\n  font-weight: 600;\n  letter-spacing: 0.18em;\n  color: var(--gold);\n  text-transform: uppercase;\n  line-height: 1.3;\n}\n\n.sidebar-brand p {\n  font-size: 0.58rem;\n  color: var(--text-faint);\n  letter-spacing: 0.1em;\n  margin-top: 0.25rem;\n}\n\n/* Dev badge */\n.dev-badge {\n  margin: 0.8rem 1.2rem 0;\n  display: inline-flex;\n  align-items: center;\n  gap: 0.4rem;\n  background: oklch(96% 0.06 50);\n  border: 1px solid oklch(82% 0.10 50);\n  border-radius: 3px;\n  padding: 0.28rem 0.6rem;\n  font-size: 0.58rem;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: oklch(40% 0.14 50);\n  font-weight: 500;\n}\n\n.dev-badge::before {\n  content: '';\n  width: 5px;\n  height: 5px;\n  border-radius: 50%;\n  background: oklch(62% 0.18 50);\n  flex-shrink: 0;\n  animation: devpulse 2.2s ease-in-out infinite;\n}\n\n@keyframes devpulse { 0%,100%{opacity:1} 50%{opacity:0.35} }\n\n/* Sidebar sections */\n.sidebar-section {\n  padding: 0.7rem 1.2rem 0.6rem;\n  border-bottom: 1px solid var(--rim);\n}\n\n.sidebar-section-label {\n  font-size: 0.54rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--text-faint);\n  margin-bottom: 0.55rem;\n}\n\n/* Input status rows */\n.status-row {\n  display: flex;\n  align-items: center;\n  gap: 0.55rem;\n  font-size: 0.62rem;\n  color: var(--text-dim);\n  margin-bottom: 0.35rem;\n}\n\n.status-row:last-child { margin-bottom: 0; }\n\n.status-dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: var(--rim-strong);\n  transition: background 0.3s;\n  flex-shrink: 0;\n}\n\n.status-dot.on { background: oklch(58% 0.18 155); box-shadow: 0 0 5px oklch(58% 0.18 155 / 0.5); }\n.status-dot.searching { background: var(--gold); animation: devpulse 1s infinite; }\n\n/* Legend */\n.sidebar-legend {\n  padding: 0.7rem 1.2rem 0.8rem;\n  flex-shrink: 0;\n}\n\n/* Info pager */\n.info-pager {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  border-top: 1px solid var(--rim);\n  min-height: 0;\n}\n\n.pager-header {\n  padding: 0.55rem 1.2rem 0.4rem;\n  font-size: 0.54rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--text-faint);\n  border-bottom: 1px solid var(--rim);\n  flex-shrink: 0;\n}\n\n.pager-viewport {\n  position: relative;\n  flex: 1;\n  overflow: hidden;\n  min-height: 0;\n}\n\n.pager-page {\n  position: absolute;\n  inset: 0;\n  padding: 0.85rem 1.2rem 0.6rem;\n  opacity: 0;\n  pointer-events: none;\n  transition: transform 0.28s ease, opacity 0.2s ease;\n  overflow: hidden;\n}\n\n.pager-page.active {\n  opacity: 1;\n  pointer-events: all;\n}\n\n.pager-page h3 {\n  font-family: 'Cinzel', serif;\n  font-size: 0.64rem;\n  font-weight: 600;\n  color: var(--gold);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  margin-bottom: 0.5rem;\n}\n\n.pager-page p {\n  font-size: 0.61rem;\n  line-height: 1.7;\n  color: var(--text-dim);\n  text-wrap: pretty;\n}\n\n.pager-nav {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 0.38rem 1rem;\n  border-top: 1px solid var(--rim);\n  flex-shrink: 0;\n}\n\n.pager-btn {\n  background: none;\n  border: 1px solid var(--rim);\n  border-radius: 3px;\n  cursor: pointer;\n  font-family: 'Inconsolata', monospace;\n  font-size: 0.72rem;\n  color: var(--text-dim);\n  padding: 0.1rem 0.5rem;\n  line-height: 1.4;\n  transition: color 0.15s, border-color 0.15s;\n}\n\n.pager-btn:hover:not(:disabled) {\n  color: var(--text);\n  border-color: var(--rim-strong);\n}\n\n.pager-btn:disabled { opacity: 0.3; cursor: default; }\n\n.pager-counter {\n  font-size: 0.56rem;\n  letter-spacing: 0.1em;\n  color: var(--text-faint);\n}\n\n.pager-dots {\n  display: flex;\n  gap: 5px;\n  align-items: center;\n}\n\n.pager-dot {\n  width: 5px;\n  height: 5px;\n  border-radius: 50%;\n  background: var(--rim-strong);\n  transition: background 0.15s;\n}\n\n.pager-dot.on { background: var(--gold); }\n\n.legend-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0.28rem 0.5rem;\n}\n\n.leg-item {\n  display: flex;\n  align-items: center;\n  gap: 0.38rem;\n  font-size: 0.6rem;\n  color: var(--text-dim);\n}\n\n.leg-dot {\n  width: 7px;\n  height: 7px;\n  border-radius: 50%;\n  flex-shrink: 0;\n}\n\n/* Sidebar footer */\n.sidebar-footer {\n  padding: 0.7rem 1.2rem;\n  border-top: 1px solid var(--rim);\n  font-size: 0.55rem;\n  color: var(--text-faint);\n  letter-spacing: 0.08em;\n}\n\n/* ── MAIN CONTENT ── */\n.main-area {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  overflow: hidden;\n  padding: 0.9rem 1.5rem 0.8rem;\n  gap: 0.7rem;\n}\n\n.main-header {\n  text-align: center;\n  flex-shrink: 0;\n}\n\n.main-header p {\n  font-size: 0.58rem;\n  color: var(--text-faint);\n  letter-spacing: 0.14em;\n}\n\n/* Canvas — shrinks when QWERTY companion is open */\nbody.qwerty-open .canvas-wrap {\n  width:  min(clamp(300px, calc(100vh - 385px), 510px), calc(100vw - var(--sidebar-w) - 3rem));\n  height: min(clamp(300px, calc(100vh - 385px), 510px), calc(100vw - var(--sidebar-w) - 3rem));\n  transition: width 0.25s ease, height 0.25s ease;\n}\n\n/* Canvas — fills available vertical space, constrained by width too */\n.canvas-wrap {\n  position: relative;\n  width:  min(clamp(340px, calc(100vh - 295px), 540px), calc(100vw - var(--sidebar-w) - 3rem));\n  height: min(clamp(340px, calc(100vh - 295px), 540px), calc(100vw - var(--sidebar-w) - 3rem));\n  flex-shrink: 0;\n}\n\ncanvas {\n  width: 100%;\n  height: 100%;\n  display: block;\n  border-radius: 4px;\n}\n\n/* Readout */\n.readout {\n  display: flex;\n  align-items: center;\n  gap: 1.5rem;\n  background: var(--surface);\n  border: 1px solid var(--rim);\n  border-radius: 4px;\n  padding: 0.6rem 1.2rem;\n  width: min(540px, 92vw);\n  flex-shrink: 0;\n}\n\n.note-display {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  min-width: 3rem;\n}\n\n.note-name {\n  font-family: 'Cinzel', serif;\n  font-size: 2.1rem;\n  line-height: 1;\n  color: var(--text);\n  transition: color 0.15s;\n}\n\n.note-label {\n  font-size: 0.54rem;\n  letter-spacing: 0.18em;\n  color: var(--text-faint);\n  text-transform: uppercase;\n  margin-top: 0.15rem;\n}\n\n.divider {\n  width: 1px;\n  height: 2.5rem;\n  background: var(--rim);\n}\n\n.info-block {\n  display: flex;\n  flex-direction: column;\n  gap: 0.22rem;\n  flex: 1;\n}\n\n.info-row {\n  display: flex;\n  justify-content: space-between;\n  font-size: 0.65rem;\n}\n\n.info-key {\n  color: var(--text-faint);\n  letter-spacing: 0.08em;\n  position: relative;\n  cursor: default;\n}\n\n/* Underline hint on tooltipped labels */\n.info-key[data-tooltip] {\n  border-bottom: 1px dotted var(--rim-strong);\n}\n\n/* Tooltip bubble */\n.info-key[data-tooltip]::after {\n  content: attr(data-tooltip);\n  position: absolute;\n  bottom: calc(100% + 8px);\n  left: 50%;\n  transform: translateX(-50%);\n  background: var(--text);\n  color: var(--surface);\n  font-size: 0.58rem;\n  letter-spacing: 0.04em;\n  line-height: 1.5;\n  white-space: nowrap;\n  padding: 0.35rem 0.6rem;\n  border-radius: 3px;\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity 0.15s;\n  z-index: 100;\n  text-transform: none;\n  font-weight: 400;\n}\n\n/* Tooltip caret */\n.info-key[data-tooltip]::before {\n  content: '';\n  position: absolute;\n  bottom: calc(100% + 3px);\n  left: 50%;\n  transform: translateX(-50%);\n  border: 4px solid transparent;\n  border-top-color: var(--text);\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity 0.15s;\n  z-index: 100;\n}\n\n.info-key[data-tooltip]:hover::after,\n.info-key[data-tooltip]:hover::before {\n  opacity: 1;\n}\n\n.info-val { color: var(--text); letter-spacing: 0.05em; }\n\n/* Keyboard */\n.keyboard-wrap {\n  width: min(540px, 92vw);\n  flex-shrink: 0;\n}\n\n.keyboard-label {\n  font-size: 0.54rem;\n  letter-spacing: 0.18em;\n  color: var(--text-faint);\n  text-transform: uppercase;\n  margin-bottom: 0.4rem;\n}\n\n.keyboard {\n  position: relative;\n  height: 68px;\n  display: flex;\n}\n\n.white-keys {\n  display: flex;\n  width: 100%;\n  gap: 1.5px;\n}\n\n.wkey {\n  flex: 1;\n  background: var(--surface);\n  border-radius: 0 0 4px 4px;\n  border: 1px solid var(--rim);\n  cursor: pointer;\n  position: relative;\n  transition: background 0.1s;\n  display: flex;\n  align-items: flex-end;\n  justify-content: center;\n  padding-bottom: 4px;\n}\n\n.wkey span {\n  font-size: 0.5rem;\n  color: var(--text-faint);\n  font-family: 'Inconsolata', monospace;\n  letter-spacing: 0.04em;\n  pointer-events: none;\n}\n\n.wkey:hover { background: var(--surface2); }\n.wkey.lit { background: var(--wkey-color, #ffffff); }\n.wkey.lit span { color: var(--surface); }\n\n.black-keys {\n  position: absolute;\n  top: 0;\n  left: 0;\n  width: 100%;\n  height: 56%;\n  pointer-events: none;\n}\n\n.bkey {\n  position: absolute;\n  width: 8%;\n  height: 100%;\n  background: oklch(28% 0.01 80);\n  border-radius: 0 0 3px 3px;\n  border: 1px solid oklch(20% 0.01 80);\n  cursor: pointer;\n  pointer-events: all;\n  transition: background 0.1s;\n}\n\n.bkey:hover { background: oklch(38% 0.01 80); }\n.bkey.lit { background: var(--bkey-color, #555); }\n\n/* QWERTY companion */\n.qwerty-wrap {\n  width: min(540px, 92vw);\n  flex-shrink: 0;\n  overflow: hidden;\n  transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.25s ease;\n  max-height: 0;\n  opacity: 0;\n  margin-top: 0;\n}\n\n.qwerty-wrap.visible {\n  max-height: 80px;\n  opacity: 1;\n  margin-top: 0;\n}\n\n.qwerty-rows {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 3px;\n  padding-top: 6px;\n}\n\n.qwerty-row {\n  display: flex;\n  gap: 3px;\n}\n\n.qkey {\n  width: 26px;\n  height: 26px;\n  border-radius: 4px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-family: 'Inconsolata', monospace;\n  font-size: 0.58rem;\n  font-weight: 400;\n  cursor: default;\n  transition: background 0.12s, color 0.12s, border-color 0.12s, transform 0.08s, box-shadow 0.08s;\n  user-select: none;\n  /* unmapped default — clearly muted */\n  background: oklch(87% 0.008 80);\n  border: 1.5px solid oklch(77% 0.012 80);\n  border-bottom: 3px solid oklch(70% 0.012 80);\n  color: oklch(62% 0.010 80);\n  box-shadow: 0 1px 0 oklch(70% 0.012 80);\n}\n\n.qkey.mapped {\n  background: oklch(99% 0.004 80);\n  border: 1.5px solid oklch(78% 0.016 80);\n  border-bottom: 3px solid oklch(68% 0.016 80);\n  color: oklch(30% 0.018 80);\n  font-weight: 500;\n  box-shadow: 0 1px 0 oklch(68% 0.016 80);\n}\n\n.qkey.lit {\n  background: var(--qkey-color);\n  border-color: var(--qkey-color);\n  border-bottom-color: color-mix(in oklch, var(--qkey-color), black 25%);\n  color: #fff;\n  transform: translateY(1px);\n  box-shadow: none;\n}\n\n/* Controls */\n.controls {\n  display: flex;\n  gap: 0.45rem;\n  flex-wrap: wrap;\n  justify-content: center;\n  width: min(540px, 92vw);\n  flex-shrink: 0;\n}\n\n.btn {\n  font-family: 'Inconsolata', monospace;\n  font-size: 0.6rem;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  background: var(--surface);\n  border: 1px solid var(--rim);\n  color: var(--text-dim);\n  padding: 0.32rem 0.75rem;\n  border-radius: 3px;\n  cursor: pointer;\n  transition: all 0.15s;\n}\n\n.btn:hover {\n  border-color: var(--rim-strong);\n  color: var(--text);\n}\n\n.btn.active {\n  background: var(--gold-light);\n  border-color: oklch(72% 0.12 75);\n  color: var(--gold);\n}\n<\u002Fstyle>\n\n<script src=\"e9e0015d-86c6-4aa2-a05e-5c4adfdf48ab\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<!-- ── SIDEBAR ── -->\n<aside class=\"sidebar\">\n  <div class=\"sidebar-brand\">\n    <h1>Harmonic<br>Microworld<\u002Fh1>\n    <p>pitch · geometry · voice leading<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"dev-badge\">Under Development<\u002Fdiv>\n\n  <div class=\"sidebar-section\">\n    <div class=\"sidebar-section-label\">Inputs<\u002Fdiv>\n    <div class=\"status-row\">\n      <div class=\"status-dot\" id=\"micDot\"><\u002Fdiv>\n      <span id=\"micStatus\">mic off<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"status-row\">\n      <div class=\"status-dot\" id=\"midiDot\"><\u002Fdiv>\n      <span id=\"midiStatus\">midi off<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sidebar-legend\">\n    <div class=\"sidebar-section-label\">Pitch classes<\u002Fdiv>\n    <div class=\"legend-grid\" id=\"legend\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"info-pager\">\n    <div class=\"pager-header\">About<\u002Fdiv>\n    <div class=\"pager-viewport\" id=\"pagerViewport\">\n\n      <div class=\"pager-page active\">\n        <h3>Harmonic Microworld<\u002Fh3>\n        <p>An interactive visualization of pitch-class space — the abstract terrain of musical harmony, stripped of rhythm, timbre, and octave. Play notes with your keyboard, MIDI device, or microphone and watch the geometry of sound unfold in real time.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"pager-page\">\n        <h3>What is a Microworld?<\u002Fh3>\n        <p>A microworld is a constrained formal system with its own internal logic — a small universe. Here, the universe contains exactly twelve positions. Their relationships are fixed by interval, not by instrument or notation. The geometry reveals what notation conceals.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"pager-page\">\n        <h3>Pitch-Class Sets<\u002Fh3>\n        <p>A pitch class collapses all octaves of a note into one identity: C4, C5, and C2 are all pitch class 0. Allen Forte (1973) catalogued the 208 distinct set-classes that govern atonal music. This tool plots those sets as polygons inscribed in the circle.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"pager-page\">\n        <h3>The Two Circles<\u002Fh3>\n        <p>The chromatic circle arranges pitch classes by semitone — physical proximity on a keyboard. The circle of fifths arranges them by perfect fifth — the acoustic foundation of Western tonality. The same notes look different in each geometry.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"pager-page\">\n        <h3>References<\u002Fh3>\n        <p>Euler, L. (1739). <em>Tentamen novae theoriae musicae.<\u002Fem> St. Petersburg Academy.<\u002Fp>\n        <p style=\"margin-top:0.5rem\">Forte, A. (1973). <em>The Structure of Atonal Music.<\u002Fem> Yale University Press.<\u002Fp>\n        <p style=\"margin-top:0.5rem\">Cohn, R. (2012). <em>Audacious Euphony.<\u002Fem> Oxford University Press.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"pager-nav\">\n      <button class=\"pager-btn\" id=\"pagerPrev\">←<\u002Fbutton>\n      <div class=\"pager-dots\" id=\"pagerDots\"><\u002Fdiv>\n      <button class=\"pager-btn\" id=\"pagerNext\">→<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sidebar-footer\">\n    After Euler 1739 · Forte 1973\n  <\u002Fdiv>\n<\u002Faside>\n\n<!-- ── MAIN ── -->\n<main class=\"main-area\">\n\n  <div class=\"main-header\">\n    <p>click to play · keyboard (a–j) · mic · midi<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- CANVAS -->\n  <div class=\"canvas-wrap\">\n    <canvas id=\"wheel\" width=\"480\" height=\"480\"><\u002Fcanvas>\n  <\u002Fdiv>\n\n  <!-- READOUT -->\n  <div class=\"readout\">\n    <div class=\"note-display\">\n      <div class=\"note-name\" id=\"noteName\">—<\u002Fdiv>\n      <div class=\"note-label\">pitch class<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n    <div class=\"info-block\">\n      <div class=\"info-row\">\n        <span class=\"info-key\" data-tooltip=\"Musical distance between the lowest and highest selected notes\">interval<\u002Fspan>\n        <span class=\"info-val\" id=\"infoInterval\">—<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"info-row\">\n        <span class=\"info-key\" data-tooltip=\"Geometric polygon formed by plotting active pitch classes on the circle\">shape<\u002Fspan>\n        <span class=\"info-val\" id=\"infoShape\">—<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"info-row\">\n        <span class=\"info-key\" data-tooltip=\"Half-steps spanning the interval (0 = unison, 6 = tritone, 12 = octave)\">semitones<\u002Fspan>\n        <span class=\"info-val\" id=\"infoSemitones\">—<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"info-row\">\n        <span class=\"info-key\" data-tooltip=\"Pitch-class set: selected notes by chroma, independent of octave\">pc set<\u002Fspan>\n        <span class=\"info-val\" id=\"infoPCClass\">—<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- KEYBOARD -->\n  <div class=\"keyboard-wrap\">\n    <div class=\"keyboard-label\">Piano keyboard<\u002Fdiv>\n    <div class=\"keyboard\" id=\"keyboard\">\n      <div class=\"white-keys\" id=\"whiteKeys\"><\u002Fdiv>\n      <div class=\"black-keys\" id=\"blackKeys\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- QWERTY COMPANION -->\n  <div class=\"qwerty-wrap\" id=\"qwertyWrap\">\n    <div class=\"qwerty-rows\">\n      <div class=\"qwerty-row\" id=\"qwertyRow1\"><\u002Fdiv>\n      <div class=\"qwerty-row\" id=\"qwertyRow2\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CONTROLS -->\n  <div class=\"controls\">\n    <button class=\"btn active\" id=\"btnChromatic\" onclick=\"setView('chromatic')\">Chromatic circle<\u002Fbutton>\n    <button class=\"btn\" id=\"btnFifths\" onclick=\"setView('fifths')\">Circle of fifths<\u002Fbutton>\n    <button class=\"btn\" id=\"btnPolygon\" onclick=\"togglePolygon()\">Show polygon<\u002Fbutton>\n    <button class=\"btn\" id=\"btnMic\" onclick=\"toggleMic()\">Mic input<\u002Fbutton>\n    <button class=\"btn active\" id=\"btnSound\" onclick=\"toggleSound()\">Sound on<\u002Fbutton>\n    <button class=\"btn\" id=\"btnQwerty\" onclick=\"toggleQwerty()\">Key map<\u002Fbutton>\n    <button class=\"btn\" id=\"btnClear\" onclick=\"clearAll()\">Clear<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fmain>\n\n<script>\n// ═══════════════════════════════════════════════════════════════\n// DOMAIN CONSTANTS\n// ═══════════════════════════════════════════════════════════════\n\nconst NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];\n\n// Pitch-class colors — tuned for LIGHT background legibility.\n// Hue rotates ~30° per semitone; C shifted from near-white to deep indigo.\nconst NOTE_COLORS = [\n  '#4848a8', // C  — deep indigo\n  '#a83070', // C♯ — deep rose\n  '#1a60c8', // D  — royal blue\n  '#108888', // D♯ — teal\n  '#389020', // E  — forest green\n  '#a89000', // F  — dark amber\n  '#c86010', // F♯ — burnt orange\n  '#c02828', // G  — crimson\n  '#9818a0', // G♯ — magenta\n  '#2828c8', // A  — deep indigo\n  '#0878b0', // A♯ — ocean blue\n  '#208840', // B  — deep green\n];\n\nconst FIFTHS_ORDER = [0,7,2,9,4,11,6,1,8,3,10,5];\n\nconst INTERVAL_NAMES = [\n  'Unison','Minor 2nd','Major 2nd','Minor 3rd',\n  'Major 3rd','Perfect 4th','Tritone','Perfect 5th',\n  'Minor 6th','Major 6th','Minor 7th','Major 7th'\n];\n\nconst SHAPE_NAMES = {\n  2:'Line', 3:'Triangle', 4:'Quadrilateral', 5:'Pentagon', 6:'Hexagon',\n  7:'Heptagon', 8:'Octagon', 9:'Nonagon', 10:'Decagon', 11:'Undecagon', 12:'Dodecagon'\n};\n\nconst WHITE_PCS = [0,2,4,5,7,9,11];\nconst BLACK_PCS_IN_ORDER = [1,3,6,8,10];\nconst BLACK_KEY_OFFSETS = [0.65, 1.65, 3.65, 4.65, 5.65];\nconst NUM_OCTAVES = 2;\n\nconst KEY_MAP = {\n  'a': 0,  'w': 1,  's': 2,  'e': 3,  'd': 4,  'f': 5,\n  't': 6,  'g': 7,  'y': 8,  'h': 9,  'u': 10, 'j': 11,\n};\n\n\n// ═══════════════════════════════════════════════════════════════\n// STATE\n// ═══════════════════════════════════════════════════════════════\n\nconst state = {\n  keyboardHeld: new Set(),\n  clickHeld:    new Set(),\n  midiHeld:     new Map(),\n  micNote:      null,\n  micFreq:      null,\n  activeNotes:  new Set(),\n  view:         'chromatic',\n  showPolygon:  false,\n  soundEnabled: true,\n  midiAccess:    null,\n  midiConnected: false,\n  midiDeviceName: null,\n  showQwerty:  false,\n  micActive:    false,\n  micDenied:    false,\n  audioCtx:     null,\n  analyser:     null,\n  micStream:    null,\n  animFrame:    null,\n  pitchHistory: [],\n};\n\nfunction rebuildActiveNotes() {\n  const next = new Set([\n    ...state.keyboardHeld,\n    ...state.clickHeld,\n    ...state.midiHeld.values(),\n  ]);\n  if (state.micNote !== null) next.add(state.micNote);\n  state.activeNotes = next;\n  render();\n}\n\n\n// ═══════════════════════════════════════════════════════════════\n// PURE HELPERS\n// ═══════════════════════════════════════════════════════════════\n\nfunction hexAlpha(hex, alpha) {\n  const r = parseInt(hex.slice(1,3), 16);\n  const g = parseInt(hex.slice(3,5), 16);\n  const b = parseInt(hex.slice(5,7), 16);\n  return `rgba(${r},${g},${b},${alpha})`;\n}\n\nfunction noteAngle(pc, viewMode) {\n  const pos = viewMode === 'chromatic' ? pc : FIFTHS_ORDER.indexOf(pc);\n  return (pos / 12) * Math.PI * 2 - Math.PI / 2;\n}\n\nfunction angleXY(angle, r, cx, cy) {\n  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };\n}\n\nfunction freqToPitchClass(freq) {\n  const midi = 69 + 12 * Math.log2(freq / 440);\n  return ((Math.round(midi) % 12) + 12) % 12;\n}\n\nfunction deriveDisplayInfo(activeNotes) {\n  const sorted = Array.from(activeNotes).sort((a, b) => a - b);\n  const count = sorted.length;\n  if (count < 2) {\n    return { sorted, count, interval: null, shapeName: count === 1 ? 'Point' : '', intervalName: count === 1 ? 'Unison' : '' };\n  }\n  const lo = sorted[0], hi = sorted[count - 1];\n  const interval = (hi - lo + 12) % 12;\n  const shapeName = SHAPE_NAMES[count] || count + '-gon';\n  const intervalName = INTERVAL_NAMES[interval] || '—';\n  return { sorted, count, interval, shapeName, intervalName };\n}\n\n\n// ═══════════════════════════════════════════════════════════════\n// RENDERING\n// ═══════════════════════════════════════════════════════════════\n\nconst canvas = document.getElementById('wheel');\nconst ctx = canvas.getContext('2d');\nconst SIZE = 480;\nconst CX = SIZE / 2, CY = SIZE / 2;\nconst R_OUTER = 200;\nconst R_INNER = 158;\nconst R_LABEL = 178;\nconst R_POLY  = 138;\n\nfunction render() {\n  const info = deriveDisplayInfo(state.activeNotes);\n  renderCanvas(info);\n  renderReadout(info);\n  renderKeyboard();\n  renderControls();\n  renderMicStatus();\n  renderMidiStatus();\n  renderQwerty();\n}\n\n// ── Canvas (light-mode) ──\n\nfunction renderCanvas(info) {\n  ctx.clearRect(0, 0, SIZE, SIZE);\n\n  // Background disc — warm light\n  const bgGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, R_OUTER + 30);\n  bgGrad.addColorStop(0, '#faf9f6');\n  bgGrad.addColorStop(1, '#f0ede6');\n  ctx.beginPath();\n  ctx.arc(CX, CY, R_OUTER + 28, 0, Math.PI * 2);\n  ctx.fillStyle = bgGrad;\n  ctx.fill();\n\n  // Outer rim\n  ctx.beginPath();\n  ctx.arc(CX, CY, R_OUTER + 4, 0, Math.PI * 2);\n  ctx.strokeStyle = 'rgba(160,148,130,0.35)';\n  ctx.lineWidth = 1.5;\n  ctx.stroke();\n\n  // Inner rim\n  ctx.beginPath();\n  ctx.arc(CX, CY, R_INNER - 4, 0, Math.PI * 2);\n  ctx.strokeStyle = 'rgba(160,148,130,0.22)';\n  ctx.lineWidth = 1;\n  ctx.stroke();\n\n  // Axis lines (very faint)\n  for (let i = 0; i < 12; i++) {\n    const ang = (i / 12) * Math.PI * 2 - Math.PI / 2;\n    const p1 = angleXY(ang, R_INNER - 8, CX, CY);\n    const p2 = angleXY(ang, R_OUTER + 8, CX, CY);\n    ctx.beginPath();\n    ctx.moveTo(p1.x, p1.y);\n    ctx.lineTo(p2.x, p2.y);\n    ctx.strokeStyle = 'rgba(120,110,95,0.08)';\n    ctx.lineWidth = 1;\n    ctx.stroke();\n  }\n\n  // Polygon\n  if (state.showPolygon && info.count >= 2) {\n    renderPolygon(info.sorted);\n  }\n\n  // Note arcs\n  for (let i = 0; i < 12; i++) {\n    renderNoteArc(i, state.activeNotes.has(i));\n  }\n\n  renderCenterText(info);\n\n  // View label\n  ctx.font = '8px \"Inconsolata\", monospace';\n  ctx.textAlign = 'center';\n  ctx.fillStyle = 'rgba(120,110,95,0.30)';\n  const label = state.view === 'chromatic' ? 'CHROMATIC · semitone order' : 'CIRCLE OF FIFTHS · key order';\n  ctx.fillText(label, CX, CY + R_INNER - 20);\n}\n\nfunction renderPolygon(sorted) {\n  const points = sorted.map(pc => angleXY(noteAngle(pc, state.view), R_POLY, CX, CY));\n  const col = NOTE_COLORS[sorted[0]];\n\n  ctx.beginPath();\n  ctx.moveTo(points[0].x, points[0].y);\n  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);\n  ctx.closePath();\n  ctx.fillStyle = hexAlpha(col, 0.08);\n  ctx.fill();\n\n  ctx.beginPath();\n  ctx.moveTo(points[0].x, points[0].y);\n  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);\n  ctx.closePath();\n  ctx.strokeStyle = hexAlpha(col, 0.5);\n  ctx.lineWidth = 1.5;\n  ctx.stroke();\n\n  for (let i = 0; i < sorted.length; i++) {\n    ctx.beginPath();\n    ctx.arc(points[i].x, points[i].y, 3.5, 0, Math.PI * 2);\n    ctx.fillStyle = NOTE_COLORS[sorted[i]];\n    ctx.fill();\n  }\n}\n\nfunction renderNoteArc(pc, isActive) {\n  const ang = noteAngle(pc, state.view);\n  const span = (Math.PI * 2 / 12) * 0.82;\n  const startAng = ang - span / 2;\n  const endAng = ang + span / 2;\n  const color = NOTE_COLORS[pc];\n\n  ctx.beginPath();\n  ctx.arc(CX, CY, R_OUTER, startAng, endAng);\n  ctx.arc(CX, CY, R_INNER, endAng, startAng, true);\n  ctx.closePath();\n\n  if (isActive) {\n    ctx.fillStyle = hexAlpha(color, 0.14);\n    ctx.fill();\n    ctx.strokeStyle = hexAlpha(color, 0.70);\n    ctx.lineWidth = 1.5;\n    ctx.stroke();\n  } else {\n    ctx.fillStyle = 'rgba(180,170,155,0.10)';\n    ctx.fill();\n    ctx.strokeStyle = 'rgba(160,150,135,0.18)';\n    ctx.lineWidth = 0.5;\n    ctx.stroke();\n  }\n\n  // Label\n  const lp = angleXY(ang, R_LABEL, CX, CY);\n  ctx.font = isActive ? 'bold 13px \"Cinzel\", serif' : '11px \"Inconsolata\", monospace';\n  ctx.textAlign = 'center';\n  ctx.textBaseline = 'middle';\n  ctx.fillStyle = isActive ? color : 'rgba(120,110,95,0.45)';\n  ctx.fillText(NOTE_NAMES[pc], lp.x, lp.y);\n}\n\nfunction renderCenterText(info) {\n  if (info.count === 0) {\n    ctx.font = '11px \"Inconsolata\", monospace';\n    ctx.textAlign = 'center';\n    ctx.textBaseline = 'middle';\n    ctx.fillStyle = 'rgba(120,110,95,0.35)';\n    ctx.fillText('play a note', CX, CY - 8);\n    ctx.fillText('to begin', CX, CY + 10);\n  } else if (info.count === 1) {\n    const pc = info.sorted[0];\n    ctx.font = 'bold 28px \"Cinzel\", serif';\n    ctx.textAlign = 'center';\n    ctx.textBaseline = 'middle';\n    ctx.fillStyle = NOTE_COLORS[pc];\n    ctx.fillText(NOTE_NAMES[pc], CX, CY - 4);\n    ctx.font = '9px \"Inconsolata\", monospace';\n    ctx.fillStyle = 'rgba(120,110,95,0.45)';\n    ctx.fillText('pc ' + pc, CX, CY + 18);\n  } else {\n    ctx.font = '10px \"Inconsolata\", monospace';\n    ctx.textAlign = 'center';\n    ctx.textBaseline = 'middle';\n    ctx.fillStyle = 'rgba(80,70,60,0.55)';\n    ctx.fillText(info.count + ' notes', CX, CY - 14);\n    ctx.fillStyle = NOTE_COLORS[info.sorted[0]];\n    ctx.font = '9px \"Inconsolata\", monospace';\n    if (info.count === 2) {\n      ctx.fillText(info.intervalName, CX, CY + 2);\n    }\n    ctx.fillStyle = 'rgba(80,70,60,0.40)';\n    ctx.fillText('set {' + info.sorted.join(',') + '}', CX, CY + 18);\n  }\n}\n\n// ── Readout panel ──\n\nfunction renderReadout(info) {\n  const nameEl = document.getElementById('noteName');\n  const intEl  = document.getElementById('infoInterval');\n  const shpEl  = document.getElementById('infoShape');\n  const semEl  = document.getElementById('infoSemitones');\n  const pcEl   = document.getElementById('infoPCClass');\n\n  if (info.count === 0) {\n    nameEl.textContent = '—';\n    nameEl.style.color = '';\n    intEl.textContent = '—';\n    shpEl.textContent = '—';\n    semEl.textContent = '—';\n    pcEl.textContent  = '—';\n  } else if (info.count === 1) {\n    const pc = info.sorted[0];\n    nameEl.textContent = NOTE_NAMES[pc];\n    nameEl.style.color = NOTE_COLORS[pc];\n    intEl.textContent = 'Unison';\n    shpEl.textContent = 'Point';\n    semEl.textContent = '0';\n    pcEl.textContent  = String(pc);\n  } else {\n    nameEl.textContent = NOTE_NAMES[info.sorted[0]];\n    nameEl.style.color = NOTE_COLORS[info.sorted[0]];\n    intEl.textContent  = info.intervalName;\n    shpEl.textContent  = info.shapeName;\n    semEl.textContent  = String(info.interval);\n    pcEl.textContent   = '(' + info.sorted.join(',') + ')';\n  }\n}\n\nfunction renderKeyboard() {\n  document.querySelectorAll('.wkey, .bkey').forEach(el => {\n    const pc = parseInt(el.dataset.pc);\n    el.classList.toggle('lit', state.activeNotes.has(pc));\n  });\n}\n\nfunction renderControls() {\n  document.getElementById('btnChromatic').classList.toggle('active', state.view === 'chromatic');\n  document.getElementById('btnFifths').classList.toggle('active', state.view === 'fifths');\n  document.getElementById('btnPolygon').classList.toggle('active', state.showPolygon);\n  document.getElementById('btnMic').classList.toggle('active', state.micActive);\n  document.getElementById('btnSound').classList.toggle('active', state.soundEnabled);\n  document.getElementById('btnQwerty').classList.toggle('active', state.showQwerty);\n  document.getElementById('qwertyWrap').classList.toggle('visible', state.showQwerty);\n  renderQwerty();\n}\n\nfunction renderQwerty() {\n  document.querySelectorAll('.qkey').forEach(el => {\n    const pc = parseInt(el.dataset.pc);\n    if (isNaN(pc)) return;\n    const active = state.activeNotes.has(pc);\n    el.classList.toggle('lit', active);\n    if (active) el.style.setProperty('--qkey-color', NOTE_COLORS[pc]);\n    else el.style.removeProperty('--qkey-color');\n  });\n}\n\nfunction renderMicStatus() {\n  const dot = document.getElementById('micDot');\n  const label = document.getElementById('micStatus');\n  if (state.micDenied) {\n    dot.className = 'status-dot';\n    label.textContent = 'mic denied';\n  } else if (!state.micActive) {\n    dot.className = 'status-dot';\n    label.textContent = 'mic off';\n  } else if (state.micNote !== null) {\n    dot.className = 'status-dot on';\n    const freqStr = state.micFreq ? '  (' + Math.round(state.micFreq) + ' Hz)' : '';\n    label.textContent = NOTE_NAMES[state.micNote] + freqStr;\n  } else {\n    dot.className = 'status-dot searching';\n    label.textContent = 'listening...';\n  }\n}\n\nfunction renderMidiStatus() {\n  const dot = document.getElementById('midiDot');\n  const label = document.getElementById('midiStatus');\n  if (state.midiConnected) {\n    const noteCount = state.midiHeld.size;\n    dot.className = noteCount > 0 ? 'status-dot on' : 'status-dot searching';\n    const name = state.midiDeviceName || 'MIDI device';\n    label.textContent = noteCount > 0\n      ? name + '  (' + noteCount + ' held)'\n      : name + '  connected';\n  } else {\n    dot.className = 'status-dot';\n    label.textContent = 'midi off';\n  }\n}\n\n\n// ═══════════════════════════════════════════════════════════════\n// INPUT: COMPUTER KEYBOARD\n// ═══════════════════════════════════════════════════════════════\n\nconst keysDown = new Set();\n\ndocument.addEventListener('keydown', e => {\n  if (keysDown.has(e.key)) return;\n  const pc = KEY_MAP[e.key.toLowerCase()];\n  if (pc !== undefined) {\n    keysDown.add(e.key);\n    state.keyboardHeld.add(pc);\n    synthAttack(pcToNoteName(pc));\n    rebuildActiveNotes();\n  }\n});\n\ndocument.addEventListener('keyup', e => {\n  keysDown.delete(e.key);\n  const pc = KEY_MAP[e.key.toLowerCase()];\n  if (pc !== undefined) {\n    state.keyboardHeld.delete(pc);\n    synthRelease(pcToNoteName(pc));\n    rebuildActiveNotes();\n  }\n});\n\n\n// ═══════════════════════════════════════════════════════════════\n// INPUT: CLICK/TOUCH\n// ═══════════════════════════════════════════════════════════════\n\nfunction handlePianoClick(pc) {\n  if (state.clickHeld.has(pc)) {\n    state.clickHeld.delete(pc);\n    synthRelease(pcToNoteName(pc));\n  } else {\n    state.clickHeld.add(pc);\n    synthAttack(pcToNoteName(pc));\n  }\n  rebuildActiveNotes();\n}\n\n\n// ═══════════════════════════════════════════════════════════════\n// INPUT: MIDI\n// ═══════════════════════════════════════════════════════════════\n\nasync function initMIDI() {\n  if (!navigator.requestMIDIAccess) return;\n  try {\n    const access = await navigator.requestMIDIAccess();\n    state.midiAccess = access;\n    attachMIDIInputs(access);\n    access.onstatechange = () => attachMIDIInputs(access);\n  } catch (e) {}\n}\n\nfunction attachMIDIInputs(access) {\n  let firstName = null;\n  let hasConnected = false;\n  for (const input of access.inputs.values()) {\n    if (input.state === 'connected') {\n      input.onmidimessage = handleMIDIMessage;\n      hasConnected = true;\n      if (!firstName) firstName = input.name;\n    }\n  }\n  state.midiConnected = hasConnected;\n  state.midiDeviceName = firstName;\n  if (!hasConnected && state.midiHeld.size > 0) {\n    state.midiHeld.clear();\n    rebuildActiveNotes();\n  } else {\n    render();\n  }\n}\n\nfunction handleMIDIMessage(e) {\n  const data = e.data;\n  if (!data || data.length < 3) return;\n  const status = data[0] & 0xf0;\n  const noteNumber = data[1];\n  const velocity = data[2];\n  if (status === 0x90 && velocity > 0) {\n    state.midiHeld.set(noteNumber, noteNumber % 12);\n    synthAttack(midiNoteToName(noteNumber));\n    rebuildActiveNotes();\n  } else if (status === 0x80 || (status === 0x90 && velocity === 0)) {\n    state.midiHeld.delete(noteNumber);\n    synthRelease(midiNoteToName(noteNumber));\n    rebuildActiveNotes();\n  }\n}\n\n\n// ═══════════════════════════════════════════════════════════════\n// INPUT: MICROPHONE\n// ═══════════════════════════════════════════════════════════════\n\nasync function toggleMic() {\n  if (state.micActive) { stopMic(); } else { await startMic(); }\n}\n\nasync function startMic() {\n  try {\n    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });\n    state.micStream = stream;\n    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();\n    state.analyser = state.audioCtx.createAnalyser();\n    state.analyser.fftSize = 4096;\n    const src = state.audioCtx.createMediaStreamSource(stream);\n    src.connect(state.analyser);\n    state.micActive = true;\n    state.micDenied = false;\n    state.pitchHistory = [];\n    state.micNote = null;\n    state.micFreq = null;\n    render();\n    detectPitch();\n  } catch (e) {\n    state.micActive = false;\n    state.micDenied = true;\n    render();\n  }\n}\n\nfunction stopMic() {\n  if (state.micStream) state.micStream.getTracks().forEach(t => t.stop());\n  if (state.audioCtx) state.audioCtx.close();\n  if (state.animFrame) cancelAnimationFrame(state.animFrame);\n  state.micActive = false;\n  state.micDenied = false;\n  state.audioCtx = null;\n  state.analyser = null;\n  state.micStream = null;\n  state.animFrame = null;\n  state.pitchHistory = [];\n  state.micNote = null;\n  state.micFreq = null;\n  rebuildActiveNotes();\n}\n\nfunction detectPitch() {\n  if (!state.micActive) return;\n  const buffer = new Float32Array(state.analyser.fftSize);\n  state.analyser.getFloatTimeDomainData(buffer);\n  const freq = autoCorrelate(buffer, state.audioCtx.sampleRate);\n  let newMicNote = null;\n  let newMicFreq = null;\n  if (freq > 60 && freq < 2000) {\n    const pc = freqToPitchClass(freq);\n    newMicFreq = freq;\n    state.pitchHistory.push(pc);\n    if (state.pitchHistory.length > 5) state.pitchHistory.shift();\n    const mode = state.pitchHistory.filter(p => p === pc).length;\n    if (mode >= 3) newMicNote = pc;\n  } else {\n    state.pitchHistory = [];\n  }\n  const noteChanged = newMicNote !== state.micNote;\n  state.micFreq = newMicFreq;\n  if (noteChanged) {\n    state.micNote = newMicNote;\n    rebuildActiveNotes();\n  } else {\n    renderMicStatus();\n  }\n  state.animFrame = requestAnimationFrame(detectPitch);\n}\n\nfunction autoCorrelate(buffer, sampleRate) {\n  const SIZE = buffer.length;\n  let rms = 0;\n  for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];\n  rms = Math.sqrt(rms / SIZE);\n  if (rms < 0.015) return -1;\n  let r1 = 0, r2 = SIZE - 1;\n  for (let i = 0; i < SIZE / 2; i++) {\n    if (Math.abs(buffer[i]) < 0.2) { r1 = i; break; }\n  }\n  for (let i = 1; i < SIZE / 2; i++) {\n    if (Math.abs(buffer[SIZE - i]) < 0.2) { r2 = SIZE - i; break; }\n  }\n  const buf = buffer.slice(r1, r2);\n  const c = new Array(buf.length).fill(0);\n  for (let i = 0; i < buf.length; i++) {\n    for (let j = 0; j < buf.length - i; j++) {\n      c[i] += buf[j] * buf[j + i];\n    }\n  }\n  let d = 0;\n  while (c[d] > c[d + 1]) d++;\n  let maxVal = -1, maxPos = -1;\n  for (let i = d; i < buf.length; i++) {\n    if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; }\n  }\n  if (maxPos < 0) return -1;\n  let T0 = maxPos;\n  const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];\n  if (x1 !== undefined && x3 !== undefined) {\n    T0 = T0 + (x3 - x1) / (2 * (2 * x2 - x1 - x3));\n  }\n  return sampleRate / T0;\n}\n\n\n// ═══════════════════════════════════════════════════════════════\n// VIEW CONTROLS\n// ═══════════════════════════════════════════════════════════════\n\nfunction toggleQwerty() {\n  state.showQwerty = !state.showQwerty;\n  document.body.classList.toggle('qwerty-open', state.showQwerty);\n  renderControls();\n}\nfunction setView(v) { state.view = v; render(); }\nfunction togglePolygon() { state.showPolygon = !state.showPolygon; render(); }\nfunction toggleSound() {\n  state.soundEnabled = !state.soundEnabled;\n  if (!state.soundEnabled) synth.releaseAll();\n  render();\n}\nfunction clearAll() {\n  state.keyboardHeld.clear();\n  state.clickHeld.clear();\n  state.midiHeld.clear();\n  synth.releaseAll();\n  rebuildActiveNotes();\n}\n\n\n// ═══════════════════════════════════════════════════════════════\n// SOUND\n// ═══════════════════════════════════════════════════════════════\n\nconst NOTE_NAMES_TONE = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];\n\nlet toneStarted = false;\nconst synth = new Tone.PolySynth(Tone.Synth, {\n  maxPolyphony: 16,\n  voice: Tone.Synth,\n  options: {\n    oscillator: { type: 'triangle' },\n    envelope: { attack: 0.02, decay: 0.3, sustain: 0.4, release: 0.8 },\n    volume: -12,\n  },\n}).toDestination();\n\nasync function ensureToneStarted() {\n  if (!toneStarted) { await Tone.start(); toneStarted = true; }\n}\n\nfunction pcToNoteName(pc, octave) {\n  return NOTE_NAMES_TONE[pc] + (octave !== undefined ? octave : 4);\n}\n\nfunction midiNoteToName(noteNumber) {\n  const pc = noteNumber % 12;\n  const octave = Math.floor(noteNumber / 12) - 1;\n  return NOTE_NAMES_TONE[pc] + octave;\n}\n\nfunction synthAttack(noteName) {\n  if (!state.soundEnabled) return;\n  ensureToneStarted();\n  synth.triggerAttack(noteName);\n}\n\nfunction synthRelease(noteName) {\n  synth.triggerRelease(noteName);\n}\n\n\n// ═══════════════════════════════════════════════════════════════\n// ONE-TIME SETUP\n// ═══════════════════════════════════════════════════════════════\n\nfunction buildKeyboard() {\n  const whiteContainer = document.getElementById('whiteKeys');\n  const blackContainer = document.getElementById('blackKeys');\n  whiteContainer.innerHTML = '';\n  blackContainer.innerHTML = '';\n  const totalWhite = WHITE_PCS.length * NUM_OCTAVES;\n  const ww = 100 / totalWhite;\n  for (let oct = 0; oct < NUM_OCTAVES; oct++) {\n    WHITE_PCS.forEach((pc) => {\n      const div = document.createElement('div');\n      div.className = 'wkey';\n      div.dataset.pc = pc;\n      div.innerHTML = `<span>${NOTE_NAMES[pc]}<\u002Fspan>`;\n      div.style.setProperty('--wkey-color', NOTE_COLORS[pc] + '33');\n      div.addEventListener('mousedown', () => handlePianoClick(pc));\n      whiteContainer.appendChild(div);\n    });\n  }\n  for (let oct = 0; oct < NUM_OCTAVES; oct++) {\n    BLACK_KEY_OFFSETS.forEach((off, bi) => {\n      const pc = BLACK_PCS_IN_ORDER[bi];\n      const div = document.createElement('div');\n      div.className = 'bkey';\n      div.dataset.pc = pc;\n      div.style.setProperty('--bkey-color', NOTE_COLORS[pc]);\n      div.style.left = (oct * WHITE_PCS.length + off) * ww + '%';\n      div.addEventListener('mousedown', (e) => {\n        e.stopPropagation();\n        handlePianoClick(pc);\n      });\n      blackContainer.appendChild(div);\n    });\n  }\n}\n\nfunction buildLegend() {\n  const el = document.getElementById('legend');\n  NOTE_NAMES.forEach((name, i) => {\n    el.innerHTML += `<div class=\"leg-item\"><div class=\"leg-dot\" style=\"background:${NOTE_COLORS[i]}\"><\u002Fdiv><span>${name}<\u002Fspan><\u002Fdiv>`;\n  });\n}\n\nconst LETTER_TO_PC = {'A':0,'W':1,'S':2,'E':3,'D':4,'F':5,'T':6,'G':7,'Y':8,'H':9,'U':10,'J':11};\nconst QWERTY_ROW1 = ['Q','W','E','R','T','Y','U','I','O','P'];\nconst QWERTY_ROW2 = ['A','S','D','F','G','H','J','K','L'];\n\nfunction buildQwerty() {\n  [['qwertyRow1', QWERTY_ROW1], ['qwertyRow2', QWERTY_ROW2]].forEach(([id, letters]) => {\n    const row = document.getElementById(id);\n    row.innerHTML = '';\n    letters.forEach(letter => {\n      const pc = LETTER_TO_PC[letter];\n      const mapped = pc !== undefined;\n      const el = document.createElement('div');\n      el.className = 'qkey' + (mapped ? ' mapped' : '');\n      el.textContent = letter;\n      if (mapped) el.dataset.pc = pc;\n      row.appendChild(el);\n    });\n  });\n}\n\n// ── Go ──\nbuildKeyboard();\nbuildLegend();\nbuildQwerty();\ninitMIDI();\nrender();\n\n// ── Info pager ──\n(function() {\n  const pages = Array.from(document.querySelectorAll('.pager-page'));\n  const total  = pages.length;\n  let current  = 0;\n\n  function goTo(idx, dir) {\n    const leaving  = pages[current];\n    const arriving = pages[idx];\n\n    // Position incoming page off-screen\n    arriving.style.transition = 'none';\n    arriving.style.transform  = `translateX(${dir * 100}%)`;\n    arriving.style.opacity    = '1';\n    arriving.classList.add('active');\n\n    // Force reflow so the initial position is painted before animating\n    arriving.offsetHeight;\n\n    // Slide both\n    const dur = '0.28s';\n    arriving.style.transition = `transform ${dur} ease`;\n    leaving.style.transition  = `transform ${dur} ease`;\n    arriving.style.transform  = 'translateX(0)';\n    leaving.style.transform   = `translateX(${-dir * 100}%)`;\n\n    setTimeout(() => {\n      leaving.classList.remove('active');\n      leaving.style.transform  = '';\n      leaving.style.transition = '';\n      leaving.style.opacity    = '';\n    }, 285);\n\n    current = idx;\n    updateNav();\n  }\n\n  function updateNav() {\n    document.getElementById('pagerPrev').disabled = current === 0;\n    document.getElementById('pagerNext').disabled = current === total - 1;\n    const dots = document.getElementById('pagerDots');\n    dots.innerHTML = Array.from({ length: total }, (_, i) =>\n      `<div class=\"pager-dot${i === current ? ' on' : ''}\"><\u002Fdiv>`\n    ).join('');\n  }\n\n  document.getElementById('pagerPrev').addEventListener('click', () => {\n    if (current > 0) goTo(current - 1, -1);\n  });\n  document.getElementById('pagerNext').addEventListener('click', () => {\n    if (current < total - 1) goTo(current + 1, 1);\n  });\n\n  updateNav();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
