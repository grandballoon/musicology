<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonic Microworld</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inconsolata:wght@300;400&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #11111a;
  --rim: #1e1e30;
  --text: #c8c8e0;
  --text-dim: #555570;
  --gold: #c8a84b;
  --gold-dim: #6b5820;
  --white: #e8e8f4;

  /* Interval polygon colors — our own system, not George's */
  --c:  #e8e8f4;
  --cs: #d4a0c0;
  --d:  #a0b8e0;
  --ds: #80d4c0;
  --e:  #a0e080;
  --f:  #e0d060;
  --fs: #e09040;
  --g:  #e05050;
  --gs: #c040a0;
  --a:  #6060e0;
  --as: #40a0d0;
  --b:  #60c060;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inconsolata', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* Subtle star-field background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(200,200,240,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 8%, rgba(200,200,240,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 35%, rgba(200,200,240,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 12%, rgba(200,200,240,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 80%, rgba(200,200,240,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 70%, rgba(200,200,240,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 5% 55%, rgba(200,200,240,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 93% 68%, rgba(200,200,240,0.2) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

header {
  text-align: center;
  padding: 2rem 1rem 0.5rem;
  position: relative;
  z-index: 1;
}

header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.1rem, 3vw, 1.6rem);
  font-weight: 400;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
}

header p {
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  margin-top: 0.3rem;
}

.main {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  padding: 1rem;
  width: 100%;
  max-width: 600px;
  position: relative;
  z-index: 1;
}

/* ── CANVAS WRAPPER ── */
.canvas-wrap {
  position: relative;
  width: min(480px, 92vw);
  height: min(480px, 92vw);
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── NOTE READOUT ── */
.readout {
  display: flex;
  align-items: center;
  gap: 2rem;
  background: var(--surface);
  border: 1px solid var(--rim);
  border-radius: 4px;
  padding: 0.8rem 1.6rem;
  width: min(480px, 92vw);
}

.note-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 3.5rem;
}

.note-name {
  font-family: 'Cinzel', serif;
  font-size: 2.8rem;
  line-height: 1;
  color: var(--white);
  transition: color 0.15s;
}

.note-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 0.2rem;
}

.divider {
  width: 1px;
  height: 3rem;
  background: var(--rim);
}

.info-block {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  flex: 1;
}

.info-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
}

.info-key { color: var(--text-dim); letter-spacing: 0.08em; }
.info-val { color: var(--text); letter-spacing: 0.05em; }

/* ── KEYBOARD ── */
.keyboard-wrap {
  width: min(480px, 92vw);
}

.keyboard-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.keyboard {
  position: relative;
  height: 80px;
  display: flex;
}

.white-keys {
  display: flex;
  width: 100%;
  gap: 2px;
}

.wkey {
  flex: 1;
  background: #d8d8e8;
  border-radius: 0 0 4px 4px;
  border: 1px solid #888;
  cursor: pointer;
  position: relative;
  transition: background 0.1s;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 6px;
  -webkit-user-select: none;
  user-select: none;
}

.wkey span {
  font-size: 0.55rem;
  color: #666;
  font-family: 'Inconsolata', monospace;
  letter-spacing: 0.05em;
  pointer-events: none;
}

.wkey:hover { background: #ececf8; }
.wkey.lit { background: var(--wkey-color, #ffffff); }

.black-keys {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 55%;
  pointer-events: none;
}

.bkey {
  position: absolute;
  width: 8%;
  height: 100%;
  background: #1a1a2a;
  border-radius: 0 0 3px 3px;
  border: 1px solid #000;
  cursor: pointer;
  pointer-events: all;
  transition: background 0.1s;
  -webkit-user-select: none;
  user-select: none;
}

.bkey:hover { background: #333355; }
.bkey.lit { background: var(--bkey-color, #333355); }

/* ── CONTROLS ── */
.controls {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  justify-content: center;
  width: min(480px, 92vw);
}

.btn {
  font-family: 'Inconsolata', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: var(--surface);
  border: 1px solid var(--rim);
  color: var(--text-dim);
  padding: 0.4rem 0.9rem;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.btn:hover, .btn.active {
  border-color: var(--gold-dim);
  color: var(--gold);
}

.btn.active {
  background: #1a1508;
}

/* ── MIC STATUS ── */
.mic-bar {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--text-dim);
}

.mic-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--rim);
  transition: background 0.3s;
}

.mic-dot.on { background: #50e090; box-shadow: 0 0 6px #50e090; }
.mic-dot.searching { background: var(--gold); animation: pulse 1s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── LEGEND ── */
.legend {
  width: min(480px, 92vw);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.3rem;
  padding-bottom: 2rem;
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.6rem;
  color: var(--text-dim);
}

.leg-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
</style>
</head>
<body>

<header>
  <h1>Harmonic Microworld</h1>
  <p>pitch · geometry · voice leading — after Euler 1739 · Forte 1973</p>
</header>

<div class="main">

  <!-- CANVAS -->
  <div class="canvas-wrap">
    <canvas id="wheel" width="480" height="480"></canvas>
  </div>

  <!-- READOUT -->
  <div class="readout">
    <div class="note-display">
      <div class="note-name" id="noteName">—</div>
      <div class="note-label">pitch class</div>
    </div>
    <div class="divider"></div>
    <div class="info-block">
      <div class="info-row">
        <span class="info-key">interval</span>
        <span class="info-val" id="infoInterval">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">shape</span>
        <span class="info-val" id="infoShape">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">semitones</span>
        <span class="info-val" id="infoSemitones">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">pc class</span>
        <span class="info-val" id="infoPCClass">—</span>
      </div>
    </div>
  </div>

  <!-- KEYBOARD -->
  <div class="keyboard-wrap">
    <div class="keyboard-label">click to toggle · type keys (a–j) to hold · sustain to latch</div>
    <div class="keyboard" id="keyboard">
      <div class="white-keys" id="whiteKeys"></div>
      <div class="black-keys" id="blackKeys"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn active" id="btnChromatic" onclick="setView('chromatic')">Chromatic circle</button>
    <button class="btn" id="btnFifths" onclick="setView('fifths')">Circle of fifths</button>
    <button class="btn" id="btnPolygon" onclick="togglePolygon()">Show polygon</button>
    <button class="btn" id="btnSustain" onclick="toggleSustain()">Sustain</button>
    <button class="btn" id="btnMic" onclick="toggleMic()">🎙 Mic input</button>
    <button class="btn" id="btnClear" onclick="clearNotes()">Clear</button>
  </div>

  <!-- MIC STATUS -->
  <div class="mic-bar">
    <div class="mic-dot" id="micDot"></div>
    <span id="micStatus">mic off</span>
  </div>

  <!-- LEGEND -->
  <div class="legend" id="legend"></div>

</div>

<!-- Tone.js for audio synthesis -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────

const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

// Note names Tone.js understands (for pitch class -> note conversion)
const TONE_NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Our own color system: hue rotates by ~30° per semitone,
// sat/lightness chosen for dark-bg legibility
const NOTE_COLORS = [
  '#e8e8f4', // C  — near white
  '#d4a0c0', // C♯ — rose
  '#a0b8e0', // D  — steel blue
  '#80d4c0', // D♯ — teal
  '#a0e080', // E  — spring green
  '#e0d060', // F  — amber
  '#e09040', // F♯ — orange
  '#e05050', // G  — coral red
  '#c040a0', // G♯ — magenta
  '#6060e0', // A  — indigo
  '#40a0d0', // A♯ — sky
  '#60c060', // B  — green
];

// Chromatic order: 0=C,1=C♯,...11=B
// Circle-of-fifths order
const FIFTHS_ORDER = [0,7,2,9,4,11,6,1,8,3,10,5]; // C G D A E B F♯ C♯ G♯ D♯ A♯ F

const INTERVAL_NAMES = [
  'Unison','Minor 2nd','Major 2nd','Minor 3rd',
  'Major 3rd','Perfect 4th','Tritone','Perfect 5th',
  'Minor 6th','Major 6th','Minor 7th','Major 7th'
];

// ─────────────────────────────────────────────
// AUDIO ENGINE (Tone.js)
// ─────────────────────────────────────────────

// We use a PolySynth so multiple notes can sound simultaneously.
// Simple piano-like tone: triangle wave with a fast attack and medium release.
let synth = null;
let toneStarted = false;

function ensureTone() {
  if (toneStarted) return;
  // Tone.start() must be called from a user gesture
  Tone.start();
  toneStarted = true;
  synth = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 12,
    voice: Tone.Synth,
    options: {
      oscillator: { type: 'triangle' },
      envelope: {
        attack: 0.02,
        decay: 0.3,
        sustain: 0.4,
        release: 0.8
      },
      volume: -8
    }
  }).toDestination();
}

// Convert pitch class to a Tone.js note string at octave 4
function pcToToneName(pc) {
  return TONE_NOTE_NAMES[pc] + '4';
}

// Track which pitch classes currently have sound playing
const soundingNotes = new Set();

function startSound(pc) {
  ensureTone();
  if (!soundingNotes.has(pc)) {
    soundingNotes.add(pc);
    synth.triggerAttack(pcToToneName(pc));
  }
}

function stopSound(pc) {
  if (soundingNotes.has(pc)) {
    soundingNotes.delete(pc);
    if (synth) {
      synth.triggerRelease(pcToToneName(pc));
    }
  }
}

function stopAllSounds() {
  if (synth) {
    synth.releaseAll();
  }
  soundingNotes.clear();
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

// activeNotes: the pitch classes (0–11) currently displayed on the circle.
// This is the UNION of keyboard-held notes, click-held notes, and mic-detected notes.
let activeNotes = new Set();

// Separate tracking for different input sources
let keyboardHeld = new Set();   // held via computer keyboard (key-down / key-up)
let clickHeld = new Set();      // toggled via on-screen keyboard clicks

let view = 'chromatic';         // 'chromatic' | 'fifths'
let showPolygon = false;
let sustainMode = false;        // when true, keyboard keys toggle instead of hold
let micActive = false;
let audioCtx = null, analyser = null, micStream = null;
let animFrame = null;
let pitchHistory = [];
let micNote = -1;               // current mic-detected pitch class, or -1

// ─────────────────────────────────────────────
// REBUILDING ACTIVE NOTES FROM SOURCES
// ─────────────────────────────────────────────

function rebuildActiveNotes() {
  const prev = new Set(activeNotes);
  activeNotes = new Set([...keyboardHeld, ...clickHeld]);
  if (micNote >= 0) activeNotes.add(micNote);

  // Diff: start/stop sounds as needed
  for (const pc of activeNotes) {
    if (!prev.has(pc)) startSound(pc);
  }
  for (const pc of prev) {
    if (!activeNotes.has(pc)) stopSound(pc);
  }

  updateReadout();
  updateKeyboardDisplay();
}

// ─────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const SIZE = 480;
const CX = SIZE / 2, CY = SIZE / 2;
const R_OUTER = 200;
const R_INNER = 158;
const R_LABEL = 178;
const R_POLY  = 138;

// ─────────────────────────────────────────────
// CIRCLE VIEW HELPERS
// ─────────────────────────────────────────────

function noteAngle(pc) {
  let pos;
  if (view === 'chromatic') {
    pos = pc;
  } else {
    pos = FIFTHS_ORDER.indexOf(pc);
  }
  return (pos / 12) * Math.PI * 2 - Math.PI / 2;
}

function angleXY(angle, r) {
  return {
    x: CX + r * Math.cos(angle),
    y: CY + r * Math.sin(angle)
  };
}

// ─────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────

function draw() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // Background disc
  const bgGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, R_OUTER + 30);
  bgGrad.addColorStop(0, '#13131f');
  bgGrad.addColorStop(1, '#0a0a0f');
  ctx.beginPath();
  ctx.arc(CX, CY, R_OUTER + 28, 0, Math.PI * 2);
  ctx.fillStyle = bgGrad;
  ctx.fill();

  // Outer rim
  ctx.beginPath();
  ctx.arc(CX, CY, R_OUTER + 4, 0, Math.PI * 2);
  ctx.strokeStyle = '#2a2a40';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner rim
  ctx.beginPath();
  ctx.arc(CX, CY, R_INNER - 4, 0, Math.PI * 2);
  ctx.strokeStyle = '#1e1e30';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Axis lines (faint)
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const p1 = angleXY(ang, R_INNER - 8);
    const p2 = angleXY(ang, R_OUTER + 8);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ── Draw polygon if enabled and 2+ notes active ──
  const activeArr = Array.from(activeNotes).sort((a, b) => {
    // Sort by angle position for correct polygon winding
    const angA = noteAngle(a);
    const angB = noteAngle(b);
    return angA - angB;
  });

  if (showPolygon && activeArr.length >= 2) {
    const first = angleXY(noteAngle(activeArr[0]), R_POLY);
    
    // Fill
    ctx.beginPath();
    ctx.moveTo(first.x, first.y);
    for (let i = 1; i < activeArr.length; i++) {
      const p = angleXY(noteAngle(activeArr[i]), R_POLY);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();

    const col = NOTE_COLORS[activeArr[0]];
    const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, R_POLY);
    grd.addColorStop(0, hexAlpha(col, 0.12));
    grd.addColorStop(1, hexAlpha(col, 0.03));
    ctx.fillStyle = grd;
    ctx.fill();

    // Stroke
    ctx.beginPath();
    ctx.moveTo(first.x, first.y);
    for (let i = 1; i < activeArr.length; i++) {
      const p = angleXY(noteAngle(activeArr[i]), R_POLY);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.strokeStyle = hexAlpha(col, 0.55);
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Vertex dots
    for (const pc of activeArr) {
      const p = angleXY(noteAngle(pc), R_POLY);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = NOTE_COLORS[pc];
      ctx.fill();
    }
  }

  // ── Draw note arcs ──
  for (let i = 0; i < 12; i++) {
    const ang = noteAngle(i);
    const span = (Math.PI * 2 / 12) * 0.82;
    const startAng = ang - span / 2;
    const endAng   = ang + span / 2;
    const isActive = activeNotes.has(i);
    const color = NOTE_COLORS[i];

    ctx.beginPath();
    ctx.arc(CX, CY, R_OUTER, startAng, endAng);
    ctx.arc(CX, CY, R_INNER, endAng, startAng, true);
    ctx.closePath();

    if (isActive) {
      const grad = ctx.createRadialGradient(CX, CY, R_INNER, CX, CY, R_OUTER);
      grad.addColorStop(0, hexAlpha(color, 0.15));
      grad.addColorStop(1, hexAlpha(color, 0.75));
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = hexAlpha(color, 0.9);
      ctx.lineWidth = 1.5;
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Label
    const lp = angleXY(ang, R_LABEL);
    ctx.font = isActive
      ? 'bold 13px "Cinzel", serif'
      : '11px "Inconsolata", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = isActive ? color : 'rgba(200,200,220,0.35)';
    ctx.fillText(NOTE_NAMES[i], lp.x, lp.y);

    // Outer glow halo for active
    if (isActive) {
      ctx.beginPath();
      ctx.arc(CX, CY, R_OUTER + 10, startAng - 0.01, endAng + 0.01);
      ctx.arc(CX, CY, R_OUTER + 2, endAng + 0.01, startAng - 0.01, true);
      ctx.closePath();
      ctx.fillStyle = hexAlpha(color, 0.25);
      ctx.fill();
    }
  }

  // ── Center info ──
  const sortedActive = Array.from(activeNotes).sort((a,b) => a - b);
  if (sortedActive.length === 0) {
    ctx.font = '11px "Inconsolata", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(200,200,220,0.2)';
    ctx.fillText('play a note', CX, CY - 8);
    ctx.fillText('to begin', CX, CY + 10);
  } else if (sortedActive.length === 1) {
    const pc = sortedActive[0];
    ctx.font = 'bold 28px "Cinzel", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = NOTE_COLORS[pc];
    ctx.fillText(NOTE_NAMES[pc], CX, CY - 4);
    ctx.font = '9px "Inconsolata", monospace';
    ctx.fillStyle = 'rgba(200,200,220,0.4)';
    ctx.fillText('pc ' + pc, CX, CY + 18);
  } else {
    const lo = sortedActive[0], hi = sortedActive[sortedActive.length - 1];
    const interval = (hi - lo + 12) % 12;
    ctx.font = '10px "Inconsolata", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(200,200,220,0.5)';
    ctx.fillText(sortedActive.length + ' notes', CX, CY - 14);
    ctx.fillStyle = NOTE_COLORS[lo];
    ctx.font = '9px "Inconsolata", monospace';
    if (sortedActive.length === 2) {
      ctx.fillText(INTERVAL_NAMES[interval], CX, CY + 2);
    }
    ctx.fillStyle = 'rgba(200,200,220,0.3)';
    ctx.fillText('set {' + sortedActive.join(',') + '}', CX, CY + 18);
  }

  // ── View label ──
  ctx.font = '8px "Inconsolata", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,200,220,0.18)';
  ctx.fillText(
    view === 'chromatic' ? 'CHROMATIC · semitone order' : 'CIRCLE OF FIFTHS · key order',
    CX, CY + R_INNER - 20
  );
}

// ─────────────────────────────────────────────
// READOUT UPDATE
// ─────────────────────────────────────────────

function updateReadout() {
  const active = Array.from(activeNotes).sort((a, b) => a - b);
  const nameEl = document.getElementById('noteName');
  const intEl  = document.getElementById('infoInterval');
  const shpEl  = document.getElementById('infoShape');
  const semEl  = document.getElementById('infoSemitones');
  const pcEl   = document.getElementById('infoPCClass');

  if (active.length === 0) {
    nameEl.textContent = '—';
    nameEl.style.color = '';
    intEl.textContent = '—';
    shpEl.textContent = '—';
    semEl.textContent = '—';
    pcEl.textContent  = '—';
  } else if (active.length === 1) {
    const pc = active[0];
    nameEl.textContent = NOTE_NAMES[pc];
    nameEl.style.color = NOTE_COLORS[pc];
    intEl.textContent = 'Unison';
    shpEl.textContent = 'Point';
    semEl.textContent = '0';
    pcEl.textContent  = pc;
  } else {
    const lo = active[0], hi = active[active.length - 1];
    const interval = (hi - lo + 12) % 12;
    nameEl.textContent = NOTE_NAMES[lo];
    nameEl.style.color = NOTE_COLORS[lo];
    intEl.textContent  = INTERVAL_NAMES[interval] || '—';
    const sides = active.length;
    const shapeNames = {
      2:'Line', 3:'Triangle', 4:'Quadrilateral', 5:'Pentagon', 6:'Hexagon',
      7:'Heptagon', 8:'Octagon', 9:'Nonagon', 10:'Decagon', 11:'Undecagon', 12:'Dodecagon'
    };
    shpEl.textContent = shapeNames[sides] || sides + '-gon';
    semEl.textContent = interval;
    pcEl.textContent  = '(' + active.join(',') + ')';
  }

  draw();
}

// ─────────────────────────────────────────────
// NOTE ACTIVATION (unified interface)
// ─────────────────────────────────────────────

function clearNotes() {
  keyboardHeld.clear();
  clickHeld.clear();
  micNote = -1;
  stopAllSounds();
  activeNotes.clear();
  updateReadout();
  updateKeyboardDisplay();
}

// ─────────────────────────────────────────────
// VIEW / MODE CONTROLS
// ─────────────────────────────────────────────

function setView(v) {
  view = v;
  document.getElementById('btnChromatic').classList.toggle('active', v === 'chromatic');
  document.getElementById('btnFifths').classList.toggle('active', v === 'fifths');
  draw();
}

function togglePolygon() {
  showPolygon = !showPolygon;
  document.getElementById('btnPolygon').classList.toggle('active', showPolygon);
  draw();
}

function toggleSustain() {
  sustainMode = !sustainMode;
  document.getElementById('btnSustain').classList.toggle('active', sustainMode);
  // When turning sustain off, release any keyboard-held notes
  if (!sustainMode) {
    keyboardHeld.clear();
    physicalKeysDown.clear();
    rebuildActiveNotes();
  }
}

// ─────────────────────────────────────────────
// ON-SCREEN KEYBOARD WIDGET
// ─────────────────────────────────────────────

const WHITE_PCS = [0, 2, 4, 5, 7, 9, 11];

function buildKeyboard() {
  const whiteContainer = document.getElementById('whiteKeys');
  const blackContainer = document.getElementById('blackKeys');
  whiteContainer.innerHTML = '';
  blackContainer.innerHTML = '';

  const numOctaves = 2;
  const totalWhite = WHITE_PCS.length * numOctaves; // 14

  for (let oct = 0; oct < numOctaves; oct++) {
    WHITE_PCS.forEach((pc) => {
      const div = document.createElement('div');
      div.className = 'wkey';
      div.dataset.pc = pc;
      div.innerHTML = `<span>${NOTE_NAMES[pc]}</span>`;
      div.style.setProperty('--wkey-color', NOTE_COLORS[pc]);
      // Click toggles the note in clickHeld
      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        ensureTone();
        if (clickHeld.has(pc)) {
          clickHeld.delete(pc);
        } else {
          clickHeld.add(pc);
        }
        rebuildActiveNotes();
      });
      whiteContainer.appendChild(div);
    });
  }

  // Black keys
  const bkOffsets = [0.65, 1.65, 3.65, 4.65, 5.65];
  const bkPcs = [1, 3, 6, 8, 10];
  const ww = 100 / totalWhite;

  for (let oct = 0; oct < numOctaves; oct++) {
    bkOffsets.forEach((off, bi) => {
      const pc = bkPcs[bi];
      const div = document.createElement('div');
      div.className = 'bkey';
      div.dataset.pc = pc;
      div.style.setProperty('--bkey-color', NOTE_COLORS[pc]);
      const leftPct = (oct * WHITE_PCS.length + off) * ww;
      div.style.left = leftPct + '%';
      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        ensureTone();
        if (clickHeld.has(pc)) {
          clickHeld.delete(pc);
        } else {
          clickHeld.add(pc);
        }
        rebuildActiveNotes();
      });
      blackContainer.appendChild(div);
    });
  }
}

function updateKeyboardDisplay() {
  document.querySelectorAll('.wkey, .bkey').forEach(el => {
    const pc = parseInt(el.dataset.pc);
    el.classList.toggle('lit', activeNotes.has(pc));
  });
}

// ─────────────────────────────────────────────
// COMPUTER KEYBOARD INPUT
// ─────────────────────────────────────────────

const KEY_MAP = {
  'a': 0,  // C
  'w': 1,  // C♯
  's': 2,  // D
  'e': 3,  // D♯
  'd': 4,  // E
  'f': 5,  // F
  't': 6,  // F♯
  'g': 7,  // G
  'y': 8,  // G♯
  'h': 9,  // A
  'u': 10, // A♯
  'j': 11, // B
};

// Track by the lowercase key string to avoid case mismatch issues
const physicalKeysDown = new Set();

document.addEventListener('keydown', (e) => {
  // Ignore if focus is on a button or other interactive element
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;

  const k = e.key.toLowerCase();
  if (physicalKeysDown.has(k)) return; // already held
  const pc = KEY_MAP[k];
  if (pc !== undefined) {
    e.preventDefault();
    ensureTone();
    physicalKeysDown.add(k);

    if (sustainMode) {
      // Toggle: press to add, press again to remove
      if (keyboardHeld.has(pc)) {
        keyboardHeld.delete(pc);
      } else {
        keyboardHeld.add(pc);
      }
    } else {
      // Normal hold mode
      keyboardHeld.add(pc);
    }
    rebuildActiveNotes();
  }
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  physicalKeysDown.delete(k);

  // In sustain mode, don't release on key-up — notes stay latched
  if (!sustainMode) {
    const pc = KEY_MAP[k];
    if (pc !== undefined) {
      keyboardHeld.delete(pc);
      rebuildActiveNotes();
    }
  }
});

// Also handle window blur: release all keyboard-held notes if user tabs away
window.addEventListener('blur', () => {
  if (keyboardHeld.size > 0) {
    physicalKeysDown.clear();
    keyboardHeld.clear();
    rebuildActiveNotes();
  }
});

// ─────────────────────────────────────────────
// MIC / PITCH DETECTION
// ─────────────────────────────────────────────

async function toggleMic() {
  if (micActive) {
    stopMic();
  } else {
    await startMic();
  }
}

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micStream = stream;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    const src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);
    micActive = true;
    document.getElementById('micDot').className = 'mic-dot searching';
    document.getElementById('micStatus').textContent = 'listening...';
    document.getElementById('btnMic').classList.add('active');
    detectPitch();
  } catch (e) {
    document.getElementById('micStatus').textContent = 'mic denied';
  }
}

function stopMic() {
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  if (animFrame) cancelAnimationFrame(animFrame);
  micActive = false;
  micNote = -1;
  document.getElementById('micDot').className = 'mic-dot';
  document.getElementById('micStatus').textContent = 'mic off';
  document.getElementById('btnMic').classList.remove('active');
  rebuildActiveNotes();
}

function detectPitch() {
  if (!micActive) return;

  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  const freq = autoCorrelate(buffer, audioCtx.sampleRate);

  if (freq > 60 && freq < 2000) {
    const pc = freqToPitchClass(freq);
    document.getElementById('micDot').className = 'mic-dot on';
    document.getElementById('micStatus').textContent = NOTE_NAMES[pc] + '  (' + Math.round(freq) + ' Hz)';

    pitchHistory.push(pc);
    if (pitchHistory.length > 5) pitchHistory.shift();
    const mode = pitchHistory.filter(p => p === pc).length;
    if (mode >= 3) {
      micNote = pc;
      rebuildActiveNotes();
    }
  } else {
    document.getElementById('micDot').className = 'mic-dot searching';
    document.getElementById('micStatus').textContent = 'listening...';
    pitchHistory = [];
    micNote = -1;
    rebuildActiveNotes();
  }

  animFrame = requestAnimationFrame(detectPitch);
}

function freqToPitchClass(freq) {
  const midi = 69 + 12 * Math.log2(freq / 440);
  return ((Math.round(midi) % 12) + 12) % 12;
}

// McLeod pitch method approximation (autocorrelation)
function autoCorrelate(buffer, sampleRate) {
  const SIZE = buffer.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.015) return -1;

  let r1 = 0, r2 = SIZE - 1;
  for (let i = 0; i < SIZE / 2; i++) {
    if (Math.abs(buffer[i]) < 0.2) { r1 = i; break; }
  }
  for (let i = 1; i < SIZE / 2; i++) {
    if (Math.abs(buffer[SIZE - i]) < 0.2) { r2 = SIZE - i; break; }
  }

  const buf = buffer.slice(r1, r2);
  if (buf.length < 2) return -1;

  const c = new Array(buf.length).fill(0);
  for (let i = 0; i < buf.length; i++) {
    for (let j = 0; j < buf.length - i; j++) {
      c[i] += buf[j] * buf[j + i];
    }
  }

  let d = 0;
  while (d < buf.length - 1 && c[d] > c[d + 1]) d++;
  let maxVal = -1, maxPos = -1;
  for (let i = d; i < buf.length; i++) {
    if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; }
  }
  if (maxPos < 0) return -1;

  let T0 = maxPos;
  if (T0 > 0 && T0 < buf.length - 1) {
    const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
    const denom = 2 * (2 * x2 - x1 - x3);
    if (denom !== 0) {
      T0 = T0 + (x3 - x1) / denom;
    }
  }
  return sampleRate / T0;
}

// ─────────────────────────────────────────────
// LEGEND
// ─────────────────────────────────────────────

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  NOTE_NAMES.forEach((name, i) => {
    const item = document.createElement('div');
    item.className = 'leg-item';
    item.innerHTML = `<div class="leg-dot" style="background:${NOTE_COLORS[i]}"></div><span>${name}</span>`;
    el.appendChild(item);
  });
}

// ─────────────────────────────────────────────
// UTIL
// ─────────────────────────────────────────────

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

buildKeyboard();
buildLegend();
draw();
</script>
